<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗄️ 档案部 — 龙虾帝国</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a14;--card:#12121e;--border:#1a1a2e;--border-hover:#2a2a44;--text:#e8e8ee;--text-dim:#a0a0b4;--text-muted:#55556a;--gold:#d4a843;--gold-glow:rgba(212,168,67,.15);--accent:#e74c3c;--green:#27ae60;--blue:#4a90d9;--radius:14px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;--mono:'SF Mono','Fira Code',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(212,168,67,.04),transparent),var(--bg)}
.container{max-width:900px;margin:0 auto}
header{text-align:center;padding:30px 0 24px}
header h1{font-size:28px;font-weight:800;color:var(--gold);display:flex;align-items:center;justify-content:center;gap:10px}
header p{color:var(--text-dim);font-size:14px;margin-top:6px}
.back-link{display:inline-block;margin-bottom:16px;color:var(--text-dim);font-size:13px;text-decoration:none}
.back-link:hover{color:var(--gold)}
.upload-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.upload-section h2{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.category-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.category-row label{font-size:13px;color:var(--text-dim);white-space:nowrap}
.category-input{flex:1;min-width:150px;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);font-size:14px;font-family:var(--font);outline:none}
.category-input:focus{border-color:var(--gold)}
.category-input::placeholder{color:var(--text-muted)}
.preset-tags{display:flex;gap:6px;flex-wrap:wrap}
.preset-tag{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer;transition:all .2s;font-family:var(--font)}
.preset-tag:hover{border-color:var(--gold);color:var(--gold)}
.preset-tag.active{background:var(--gold-glow);border-color:var(--gold);color:var(--gold)}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--gold);background:rgba(212,168,67,.04)}
.drop-zone .icon{font-size:42px;margin-bottom:10px}
.drop-zone p{color:var(--text-dim);font-size:14px}
.drop-zone small{color:var(--text-muted);font-size:12px}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.file-queue{margin-top:16px}
.file-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:10px;margin-bottom:8px}
.file-item .fi-icon{font-size:20px;width:32px;text-align:center}
.file-item .fi-info{flex:1;min-width:0}
.file-item .fi-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-item .fi-size{font-size:11px;color:var(--text-muted);font-family:var(--mono)}
.file-item .fi-status{font-size:12px;font-weight:600;min-width:60px;text-align:right}
.fi-status.pending{color:var(--text-muted)}
.fi-status.uploading{color:var(--blue)}
.fi-status.done{color:var(--green)}
.fi-status.error{color:var(--accent)}
.file-item .fi-remove{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:4px 8px;border-radius:6px}
.file-item .fi-remove:hover{color:var(--accent);background:rgba(231,76,60,.1)}
.upload-actions{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.btn{padding:10px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--gold),#b8922e);color:#0a0a14}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{background:rgba(255,255,255,.05);color:var(--text-dim);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border-hover);color:var(--text)}
.progress-bar{width:100%;height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:6px;overflow:hidden;display:none}
.progress-bar.active{display:block}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:2px;transition:width .3s;width:0%}
.archive-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
.archive-section h2{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.cat-group{margin-bottom:20px}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.05)}
.cat-name{font-size:15px;font-weight:700;color:var(--gold)}
.cat-count{font-size:11px;color:var(--text-muted);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:10px}
.archive-file{display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:8px;transition:background .2s}
.archive-file:hover{background:rgba(255,255,255,.03)}
.archive-file .af-icon{font-size:18px;width:28px;text-align:center}
.archive-file .af-info{flex:1;min-width:0}
.archive-file .af-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.archive-file .af-meta{font-size:11px;color:var(--text-muted);font-family:var(--mono)}
.af-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:var(--font)}
.af-btn:hover{border-color:var(--gold);color:var(--gold)}
.af-btn.del:hover{border-color:var(--accent);color:var(--accent)}
.empty-state{text-align:center;padding:40px;color:var(--text-muted)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.stats{display:flex;gap:16px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.stat-chip{padding:8px 16px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid var(--border);font-size:13px;color:var(--text-dim)}
.stat-chip strong{color:var(--gold);margin-right:4px}
.server-status{text-align:center;padding:8px;font-size:12px;border-radius:8px;margin-bottom:16px}
.server-status.ok{background:rgba(39,174,96,.1);color:var(--green);border:1px solid rgba(39,174,96,.2)}
.server-status.err{background:rgba(231,76,60,.1);color:var(--accent);border:1px solid rgba(231,76,60,.2)}
@media(max-width:600px){body{padding:12px}.upload-section,.archive-section{padding:16px}.category-row{flex-direction:column;align-items:stretch}.upload-actions{flex-direction:column}.btn{width:100%;text-align:center}}
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← 返回龙虾帝国</a>
  <header>
    <h1>🗄️ 档案部</h1>
    <p>龙虾帝国文件存档中心 — 批量上传、分类管理</p>
  </header>
  <div id="serverStatus" class="server-status ok">🟢 服务器连接中...</div>
  <div id="stats" class="stats"></div>
  <div class="upload-section">
    <h2>📤 上传文件</h2>
    <div class="category-row">
      <label>📁 分类：</label>
      <input type="text" class="category-input" id="categoryInput" placeholder="输入分类名称..." value="中考资料">
      <div class="preset-tags">
        <button class="preset-tag" onclick="setCategory('中考资料')">中考资料</button>
        <button class="preset-tag" onclick="setCategory('教育')">教育</button>
        <button class="preset-tag" onclick="setCategory('文档')">文档</button>
        <button class="preset-tag" onclick="setCategory('图片')">图片</button>
        <button class="preset-tag" onclick="setCategory('其他')">其他</button>
      </div>
    </div>
    <div class="drop-zone" id="dropZone">
      <div class="icon">📁</div>
      <p>拖拽文件到此处，或点击选择文件</p>
      <small>支持所有文件类型 · 单文件最大 100MB · 一次最多 50 个</small>
      <input type="file" id="fileInput" multiple>
    </div>
    <div class="file-queue" id="fileQueue"></div>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="upload-actions" id="uploadActions" style="display:none">
      <button class="btn btn-secondary" onclick="clearQueue()">清空列表</button>
      <button class="btn btn-primary" id="uploadBtn" onclick="startUpload()">📤 开始上传</button>
    </div>
  </div>
  <div class="archive-section">
    <h2>📚 已归档文件</h2>
    <div id="archiveList"></div>
  </div>
</div>
<script>
const API = 'https://lobster-empire.cloud-ip.cc:3000';
let fileQueue = [];

// Server check
async function checkServer() {
  const el = document.getElementById('serverStatus');
  try {
    const r = await fetch(API + '/api/archive/list', {signal: AbortSignal.timeout(5000)});
    if (r.ok) { el.className = 'server-status ok'; el.textContent = '🟢 服务器已连接'; }
    else throw new Error();
  } catch {
    el.className = 'server-status err';
    el.innerHTML = '🔴 无法连接服务器 — 请先在浏览器中打开 <a href="'+API+'" target="_blank" style="color:var(--accent);text-decoration:underline">'+API+'</a> 并接受证书';
  }
}
checkServer();

function setCategory(name) {
  document.getElementById('categoryInput').value = name;
  document.querySelectorAll('.preset-tag').forEach(t => t.classList.toggle('active', t.textContent === name));
}
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

function addFiles(files) {
  for (const f of files) {
    if (fileQueue.length >= 50) break;
    if (!fileQueue.find(q => q.file.name === f.name && q.file.size === f.size))
      fileQueue.push({ file: f, status: 'pending' });
  }
  renderQueue();
}
function removeFile(idx) { fileQueue.splice(idx, 1); renderQueue(); }
function clearQueue() { fileQueue = []; renderQueue(); }
function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const m = {pdf:'📕',doc:'📘',docx:'📘',xls:'📗',xlsx:'📗',ppt:'📙',pptx:'📙',jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',webp:'🖼️',mp4:'🎬',mp3:'🎵',zip:'📦',rar:'📦',txt:'📄',md:'📄'};
  return m[ext] || '📎';
}
function formatSize(b) { if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'; }
function renderQueue() {
  const el = document.getElementById('fileQueue'), actions = document.getElementById('uploadActions');
  if (!fileQueue.length) { el.innerHTML = ''; actions.style.display = 'none'; return; }
  actions.style.display = 'flex';
  el.innerHTML = fileQueue.map((q, i) => `<div class="file-item"><div class="fi-icon">${fileIcon(q.file.name)}</div><div class="fi-info"><div class="fi-name">${q.file.name}</div><div class="fi-size">${formatSize(q.file.size)}</div></div><div class="fi-status ${q.status}">${{pending:'等待中',uploading:'上传中...',done:'✅ 完成',error:'❌ 失败'}[q.status]}</div>${q.status==='pending'?`<button class="fi-remove" onclick="removeFile(${i})">✕</button>`:''}</div>`).join('');
}
async function startUpload() {
  const category = document.getElementById('categoryInput').value.trim() || 'general';
  const pending = fileQueue.filter(q => q.status === 'pending');
  if (!pending.length) return;
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true; btn.textContent = '上传中...';
  const bar = document.getElementById('progressBar'), fill = document.getElementById('progressFill');
  bar.classList.add('active');
  let done = 0;
  for (let i = 0; i < pending.length; i += 5) {
    const batch = pending.slice(i, i + 5);
    const fd = new FormData();
    fd.append('category', category);
    batch.forEach(q => { q.status = 'uploading'; fd.append('files', q.file); });
    renderQueue();
    try {
      const r = await fetch(API + '/api/archive/upload', { method: 'POST', body: fd });
      const d = await r.json();
      batch.forEach(q => q.status = d.success ? 'done' : 'error');
    } catch { batch.forEach(q => q.status = 'error'); }
    done += batch.length;
    fill.style.width = Math.round(done / pending.length * 100) + '%';
    renderQueue();
  }
  btn.disabled = false; btn.textContent = '📤 开始上传';
  setTimeout(() => { bar.classList.remove('active'); fill.style.width = '0%'; }, 2000);
  loadArchive();
}
async function loadArchive() {
  try {
    const r = await fetch(API + '/api/archive/list');
    const data = await r.json();
    const el = document.getElementById('archiveList'), statsEl = document.getElementById('stats');
    if (!data.categories?.length) { el.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无归档文件</p></div>'; statsEl.innerHTML = ''; return; }
    let tf = 0, ts = 0;
    data.categories.forEach(c => { tf += c.count; c.files.forEach(f => ts += f.size); });
    statsEl.innerHTML = `<div class="stat-chip"><strong>${data.categories.length}</strong>个分类</div><div class="stat-chip"><strong>${tf}</strong>个文件</div><div class="stat-chip"><strong>${formatSize(ts)}</strong>总大小</div>`;
    el.innerHTML = data.categories.map(cat => `<div class="cat-group"><div class="cat-header"><span class="cat-name">📁 ${cat.name}</span><span class="cat-count">${cat.count} 个文件</span></div>${cat.files.map(f => `<div class="archive-file"><div class="af-icon">${fileIcon(f.name)}</div><div class="af-info"><div class="af-name">${f.name}</div><div class="af-meta">${formatSize(f.size)} · ${new Date(f.time).toLocaleString('zh-CN')}</div></div><div style="display:flex;gap:4px"><button class="af-btn" onclick="window.open('${API}/api/archive/download/${encodeURIComponent(cat.name)}/${encodeURIComponent(f.filename)}')">下载</button><button class="af-btn del" onclick="deleteFile('${cat.name}','${f.filename}')">删除</button></div></div>`).join('')}</div>`).join('');
  } catch(e) { document.getElementById('archiveList').innerHTML = '<div class="empty-state"><p>加载失败: '+e.message+'</p></div>'; }
}
async function deleteFile(cat, fname) {
  if (!confirm('确定删除？')) return;
  try { await fetch(API+'/api/archive/'+encodeURIComponent(cat)+'/'+encodeURIComponent(fname),{method:'DELETE'}); loadArchive(); } catch {}
}
loadArchive();
setCategory('中考资料');
</script>
</body>
</html>
