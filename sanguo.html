<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三国·天下争锋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1008;--panel:#2a1f10;--border:#8b6914;--gold:#d4a017;--red:#c0392b;--green:#27ae60;--blue:#2980b9;--text:#e8d5b0;--text-dim:#a89070;--wei:#4a7abc;--shu:#bc4a4a;--wu:#4abc6a;--qun:#bc8a4a}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes battleFlash{0%{background:transparent}50%{background:rgba(255,50,0,.15)}100%{background:transparent}}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes victoryGlow{0%,100%{text-shadow:0 0 10px var(--gold)}50%{text-shadow:0 0 30px var(--gold),0 0 60px #ff8c00}}
body{background:var(--bg);color:var(--text);font-family:"SimSun","STSong","Noto Serif SC",serif;min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:"SimHei","STHeiti","Noto Sans SC",sans-serif}
button{font-family:inherit;cursor:pointer;border:1px solid var(--border);background:linear-gradient(180deg,#3a2a10,#2a1a08);color:var(--gold);padding:8px 18px;border-radius:4px;font-size:14px;transition:all .2s}
button:hover{background:linear-gradient(180deg,#4a3a20,#3a2a18);box-shadow:0 0 8px rgba(212,160,23,.3)}
button:disabled{opacity:.4;cursor:not-allowed}
button:active{transform:scale(.97)}
.screen{display:none;animation:fadeIn .5s ease}
.screen.active{display:block}
#title-screen{text-align:center;padding:60px 20px}
#title-screen h1{font-size:3em;color:var(--gold);text-shadow:0 0 20px rgba(212,160,23,.4);margin-bottom:10px}
#title-screen .subtitle{color:var(--text-dim);font-size:1.2em;margin-bottom:40px}
.faction-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;max-width:1000px;margin:0 auto;padding:0 20px}
.faction-card{background:var(--panel);border:2px solid var(--border);border-radius:8px;padding:20px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.faction-card:hover{transform:translateY(-4px);box-shadow:0 8px 25px rgba(0,0,0,.5)}
.faction-card.wei{border-color:var(--wei)}.faction-card.wei:hover{box-shadow:0 8px 25px rgba(74,122,188,.3)}
.faction-card.shu{border-color:var(--shu)}.faction-card.shu:hover{box-shadow:0 8px 25px rgba(188,74,74,.3)}
.faction-card.wu{border-color:var(--wu)}.faction-card.wu:hover{box-shadow:0 8px 25px rgba(74,188,106,.3)}
.faction-card.qun{border-color:var(--qun)}.faction-card.qun:hover{box-shadow:0 8px 25px rgba(188,138,74,.3)}
.faction-card h2{font-size:1.5em;margin-bottom:5px}
.faction-card .lord{color:var(--gold);margin-bottom:10px}
.faction-card .desc{font-size:.9em;color:var(--text-dim);line-height:1.6;margin-bottom:12px}
.faction-card .stats{font-size:.85em;color:var(--text-dim)}
#game-screen{display:none;height:100vh}
#game-screen.active{display:flex}
.sidebar{width:280px;min-width:280px;background:var(--panel);border-right:2px solid var(--border);overflow-y:auto;padding:12px;flex-shrink:0}
.sidebar h3{color:var(--gold);font-size:1em;border-bottom:1px solid var(--border);padding-bottom:6px;margin:12px 0 8px}
.sidebar h3:first-child{margin-top:0}
.stat-row{display:flex;justify-content:space-between;padding:3px 0;font-size:.85em}
.stat-label{color:var(--text-dim)}
.stat-val{color:var(--text)}
.general-item{background:rgba(0,0,0,.2);border:1px solid rgba(139,105,20,.3);border-radius:4px;padding:6px 8px;margin:4px 0;font-size:.8em}
.general-item .name{color:var(--gold);font-weight:bold}
.general-item .gstats{color:var(--text-dim);font-size:.9em}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top-bar{background:var(--panel);border-bottom:2px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.turn-info{color:var(--gold);font-size:1.1em}
.actions-left{color:var(--text-dim);font-size:.9em}
.content{flex:1;overflow-y:auto;padding:16px}
.map-container{margin-bottom:16px}
.map-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;max-width:600px}
.map-cell{background:rgba(0,0,0,.3);border:1px solid rgba(139,105,20,.2);border-radius:4px;padding:8px 4px;text-align:center;font-size:.75em;cursor:pointer;transition:all .2s;position:relative}
.map-cell:hover{border-color:var(--gold);z-index:1}
.map-cell.wei-own{background:rgba(74,122,188,.25);border-color:rgba(74,122,188,.5)}
.map-cell.shu-own{background:rgba(188,74,74,.25);border-color:rgba(188,74,74,.5)}
.map-cell.wu-own{background:rgba(74,188,106,.25);border-color:rgba(74,188,106,.5)}
.map-cell.qun-own{background:rgba(188,138,74,.25);border-color:rgba(188,138,74,.5)}
.map-cell.neutral{background:rgba(100,100,100,.2);border-color:rgba(100,100,100,.4)}
.map-cell.attackable{animation:pulse 1.5s infinite;border-color:var(--red)!important}
.map-cell .city-name{font-weight:bold;color:var(--text)}
.map-cell .city-info{color:var(--text-dim);font-size:.85em}
.action-panel{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin:16px 0}
.action-btn{padding:12px;font-size:.95em;text-align:center}
.action-btn .icon{font-size:1.3em;display:block;margin-bottom:4px}
.log-area{background:rgba(0,0,0,.3);border:1px solid rgba(139,105,20,.2);border-radius:6px;padding:12px;margin-top:12px;max-height:300px;overflow-y:auto}
.log-entry{padding:4px 0;font-size:.85em;animation:slideIn .3s ease;border-bottom:1px solid rgba(139,105,20,.1)}
.log-entry:last-child{border-bottom:none}
.log-entry.event{color:#e8c84a}
.log-entry.battle{color:#e85050}
.log-entry.good{color:#50c878}
.log-entry.info{color:var(--text-dim)}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .3s}
.modal{background:var(--panel);border:2px solid var(--border);border-radius:8px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;animation:fadeIn .3s}
.modal h2{color:var(--gold);margin-bottom:16px;text-align:center}
.modal-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.battle-narrative{background:rgba(0,0,0,.4);border:1px solid var(--red);border-radius:6px;padding:16px;margin:12px 0;font-size:.95em;line-height:1.8;animation:battleFlash 1s ease 3}
.battle-narrative .phase{color:var(--gold);font-weight:bold;display:block;margin:8px 0 4px}
.choice-list{list-style:none}
.choice-list li{background:rgba(0,0,0,.2);border:1px solid rgba(139,105,20,.3);border-radius:4px;padding:10px;margin:6px 0;cursor:pointer;transition:all .2s}
.choice-list li:hover{background:rgba(212,160,23,.1);border-color:var(--gold)}
.choice-list li.selected{border-color:var(--gold);background:rgba(212,160,23,.15)}
.end-turn-btn{width:100%;padding:14px;font-size:1.1em;margin-top:12px;background:linear-gradient(180deg,#4a2a10,#3a1a08);border-color:var(--red)}
.victory-screen{text-align:center;padding:40px}
.victory-screen h1{font-size:2.5em;color:var(--gold);animation:victoryGlow 2s infinite}
.bar{height:6px;background:rgba(0,0,0,.3);border-radius:3px;overflow:hidden;margin:2px 0}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.bar-fill.hp{background:var(--green)}.bar-fill.food{background:#d4a017}.bar-fill.morale{background:var(--blue)}
.save-btns{display:flex;gap:6px;margin-top:8px}
.save-btns button{font-size:.75em;padding:4px 8px}
@media(max-width:768px){
.sidebar{width:100%;min-width:0;max-height:200px;border-right:none;border-bottom:2px solid var(--border)}
#game-screen.active{flex-direction:column}
.faction-grid{grid-template-columns:1fr 1fr}
.map-grid{grid-template-columns:repeat(5,1fr)}
#title-screen h1{font-size:2em}
}
@media(max-width:480px){.faction-grid{grid-template-columns:1fr}.map-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<!-- Password Lock -->
<div id="pwLock" style="position:fixed;inset:0;z-index:99999;background:#1a1008;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'SimHei','STHeiti',sans-serif">
<div style="font-size:2.5em;color:#d4a017;margin-bottom:10px">🔒 三国·天下争锋</div>
<div style="color:#a89070;margin-bottom:20px">请输入密码进入游戏</div>
<input id="pwInput" type="password" placeholder="输入密码..." style="background:#2a1f10;border:1px solid #8b6914;color:#e8d5b0;padding:12px 20px;font-size:1.2em;border-radius:8px;text-align:center;width:260px;outline:none" onkeydown="if(event.key==='Enter')checkPw()">
<button onclick="checkPw()" style="margin-top:12px;padding:10px 30px;font-size:1em;background:linear-gradient(180deg,#3a2a10,#2a1a08);border:1px solid #8b6914;color:#d4a017;border-radius:6px;cursor:pointer">进入</button>
<div id="pwErr" style="color:#c0392b;margin-top:10px;display:none">密码错误</div>
</div>
<script>
async function checkPw(){
const pw=document.getElementById('pwInput').value;
const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
if(hash==='e6f549c3d50663fb36584b756d176a5aa1397c8edec68a18858c3a9418aae952'){
document.getElementById('pwLock').style.display='none';
sessionStorage.setItem('sg_auth','1');
}else{
document.getElementById('pwErr').style.display='block';
document.getElementById('pwInput').style.borderColor='#c0392b';
setTimeout(()=>{document.getElementById('pwErr').style.display='none';document.getElementById('pwInput').style.borderColor='#8b6914';},2000);
}
}
if(sessionStorage.getItem('sg_auth')==='1')document.addEventListener('DOMContentLoaded',()=>{document.getElementById('pwLock').style.display='none';});
</script>

const FACTIONS={
wei:{id:"wei",name:"魏",lord:"曹操",color:"var(--wei)",cls:"wei",
desc:"挟天子以令诸侯，坐拥中原富庶之地。兵多将广，谋士如云。",

desc:"仁德布四海，虽起于微末，却有关张之勇、卧龙之智。",

territories:["yangzhou","jiaozhou"],troops:12000,food:7000,gold:4500,morale:75,
generals:[{name:"周瑜",atk:85,def:80,int:92,spd:82},{name:"太史慈",atk:90,def:78,int:55,spd:88},{name:"甘宁",atk:88,def:72,int:45,spd:90}],

desc:"天下第一猛将，有赤兔马、方天画戟。虽无根基，武力盖世。",
territories:["bingzhou"],troops:10000,food:3000,gold:2000,morale:55,
generals:[{name:"吕布",atk:100,def:82,int:30,spd:97},{name:"张辽",atk:90,def:85,int:72,spd:85},{name:"高顺",atk:82,def:88,int:65,spd:70}],
advisors:[{name:"陈宫",int:90,pol:82,cha:65}]}
};
const NEUTRAL_CITIES=["youzhou","qingzhou","liangzhou","yongzhou","jizhou","hanzhong","yizhou","jingzhou","nanzhong"];
const TACTICS=[
{id:"charge",name:"正面突击",desc:"以力破巧",atkMul:1.2,defMul:0.8,beats:"lure",losesTo:"fire"},
{id:"flank",name:"迂回包抄",desc:"出其不意",atkMul:1.1,defMul:0.9,beats:"defend",losesTo:"charge"},
{id:"fire",name:"火攻",desc:"借风纵火",atkMul:1.3,defMul:0.7,beats:"charge",losesTo:"water"},
{id:"water",name:"水攻",desc:"水淹七军",atkMul:1.25,defMul:0.75,beats:"fire",losesTo:"lure"},

{name:"法正",int:92,pol:88,cha:72,type:"advisor"},
{name:"贾诩",int:96,pol:88,cha:60,type:"advisor"},
{name:"徐庶",int:90,pol:82,cha:78,type:"advisor"},
{name:"田丰",int:88,pol:90,cha:70,type:"advisor"},
{name:"程昱",int:86,pol:80,cha:65,type:"advisor"},
];
const BATTLE_NARRATIVES={
charge:["大军如潮水般涌向敌阵，杀声震天！","万马奔腾，铁蹄踏碎敌营！","正面强攻，势不可挡！"],

// ===== GAME STATE =====
let G=null; // global game state

function newGame(fid){
G={
player:fid,
year:196,season:0,
turn:0,
actionsLeft:2,
factions:{},
regions:{},
log:[],
allies:{},// {fid: {fid2: turns_remaining}}
availableHeroes:[...WANDERING_HEROES],
gameOver:false,
cityDefBonus:{}
};
// init regions
REGIONS.forEach(r=>{G.regions[r.id]={...r,owner:null,defense:r.def,foodProd:100+Math.floor(Math.random()*100),goldProd:50+Math.floor(Math.random()*80)}});
// init factions
for(let fid in FACTIONS){
let f=JSON.parse(JSON.stringify(FACTIONS[fid]));
G.factions[fid]=f;
f.territories.forEach(tid=>{G.regions[tid].owner=fid});
G.allies[fid]={};
G.cityDefBonus[fid]={};
}
// neutral cities get no owner
showGameScreen();
}

function saveGame(){try{localStorage.setItem("sanguo_save",JSON.stringify(G));addLog("💾 游戏已保存","good")}catch(e){addLog("保存失败: "+e.message,"battle")}}
function loadGame(){try{let s=localStorage.getItem("sanguo_save");if(s){G=JSON.parse(s);showGameScreen();return true}}catch(e){}return false}
function hasSave(){return !!localStorage.getItem("sanguo_save")}

// ===== RENDERING =====
function showTitleScreen(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById('title-screen').classList.add('active');
if(hasSave())document.getElementById('load-btn').style.display='inline-block';
let grid=document.getElementById('faction-grid');
grid.innerHTML='';
for(let fid in FACTIONS){
let f=FACTIONS[fid];
let card=document.createElement('div');
card.className='faction-card '+f.cls;
card.innerHTML=`<h2>${f.name}</h2><div class="lord">👑 ${f.lord}</div><div class="desc">${f.desc}</div>
<div class="stats">🏰 领地×${f.territories.length} ⚔️ ${f.troops} 🌾 ${f.food} 💰 ${f.gold}<br>武将: ${f.generals.map(g=>g.name).join('、')}<br>谋士: ${f.advisors.map(a=>a.name).join('、')}</div>`;
card.onclick=()=>newGame(fid);
grid.appendChild(card);
}
}

function showGameScreen(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById('game-screen').classList.add('active');
render();
}

function render(){
if(!G)return;
let p=G.factions[G.player];
if(!p)return;
// sidebar
let sb=document.getElementById('sidebar');
let territories=Object.values(G.regions).filter(r=>r.owner===G.player);

}

<div class="log-area"><h3 style="color:var(--gold);margin-bottom:8px">📜 战报</h3>${logHTML||'<div class="log-entry info">暂无消息</div>'}</div>`;

function renderMap(){
// 4 rows, 5 cols layout
let grid=Array.from({length:4},()=>Array(5).fill(null));
REGIONS.forEach(r=>{grid[r.row][r.col]=r});
let html='<div class="map-grid">';
let playerTerr=Object.values(G.regions).filter(r=>r.owner===G.player);
let attackable=new Set();
playerTerr.forEach(t=>{
let reg=REGIONS.find(r=>r.id===t.id);
reg.adj.forEach(a=>{if(G.regions[a].owner!==G.player)attackable.add(a)});
});
for(let row=0;row<4;row++){
for(let col=0;col<5;col++){
let r=grid[row][col];
if(!r){html+='<div class="map-cell" style="visibility:hidden"></div>';continue}
let reg=G.regions[r.id];
let cls=reg.owner?reg.owner+'-own':'neutral';
if(attackable.has(r.id))cls+=' attackable';
let ownerLabel=reg.owner?FACTIONS[reg.owner].name:'空';
html+=`<div class="map-cell ${cls}" title="${r.name}" onclick="showRegionInfo('${r.id}')"><div class="city-name">🏰${r.name}</div><div class="city-info">${ownerLabel}</div></div>`;
}
}
html+='</div>';
return html;
}

function renderFactionSummary(){

let f=G.factions[fid];
let terr=Object.values(G.regions).filter(r=>r.owner===fid).length;
if(terr===0)continue;
let isSelf=fid===G.player;
html+=`<div style="background:rgba(0,0,0,.3);border:1px solid ${FACTIONS[fid].color};border-radius:4px;padding:6px 10px;font-size:.8em">
<span style="color:${FACTIONS[fid].color};font-weight:bold">${isSelf?'👑':''}${FACTIONS[fid].lord}(${f.name})</span>
 🏰${terr} ⚔️${(f.troops/1000).toFixed(1)}k</div>`;
}
return html;
}

let myTerr=Object.values(G.regions).filter(r=>r.owner===G.player);
myTerr.forEach(t=>{let reg=REGIONS.find(r=>r.id===t.id);reg.adj.forEach(a=>{if(G.regions[a].owner!==G.player)canAttack=true})});
let actions=[
{icon:"🗡️",name:"征兵",desc:`消耗金币招募士兵`,action:()=>doRecruit(),disabled:p.gold<500},
{icon:"🌾",name:"屯田",desc:"提高粮食产量",action:()=>doFarm(),disabled:false},
{icon:"🏗️",name:"发展",desc:"增加金币收入和民心",action:()=>doDevelop(),disabled:false},
{icon:"⚔️",name:"出征",desc:"攻打相邻领地",action:()=>showAttackModal(),disabled:!canAttack},

];

// ===== ACTIONS =====
function doRecruit(){
let p=G.factions[G.player];
let cost=500,troops=2000+Math.floor(Math.random()*1000);
if(p.gold<cost){addLog("金币不足，无法征兵！","battle");render();return}
p.gold-=cost;p.troops+=troops;
addLog(`征兵${troops}人，花费${cost}金币。现有兵力${p.troops.toLocaleString()}`,"good");
useAction();
}
function doFarm(){
let myTerr=Object.values(G.regions).filter(r=>r.owner===G.player);
myTerr.forEach(t=>{t.foodProd+=15+Math.floor(Math.random()*15)});
let p=G.factions[G.player];
p.food+=500;
addLog("屯田令下，各地开垦荒地，粮食产量提升！","good");
useAction();
}
function doDevelop(){
let p=G.factions[G.player];
let myTerr=Object.values(G.regions).filter(r=>r.owner===G.player);
myTerr.forEach(t=>{t.goldProd+=10+Math.floor(Math.random()*15)});
p.morale=Math.min(100,p.morale+5);
p.gold+=200;
addLog("兴修水利，发展商贸，民心上升！","good");
useAction();
}
function doFortify(){
let p=G.factions[G.player];
if(p.gold<300){addLog("金币不足！","battle");render();return}
p.gold-=300;
let myTerr=Object.values(G.regions).filter(r=>r.owner===G.player);
myTerr.forEach(t=>{t.defense+=1});
addLog("加固城防，各城防御+1！","good");
useAction();
}
function doRecruitTalent(){
let p=G.factions[G.player];
if(G.availableHeroes.length===0){addLog("天下英雄已尽入各方麾下","info");useAction();return}
let chance=0.4+p.morale/200;
if(Math.random()<chance){
let idx=Math.floor(Math.random()*G.availableHeroes.length);
let hero=G.availableHeroes.splice(idx,1)[0];
if(hero.type==='general')p.generals.push(hero);
else p.advisors.push(hero);
addLog(`🎉 ${hero.name}慕名来投！${hero.type==='general'?'武将':'谋士'}+1`,"good");
}else{
addLog("四处寻访，暂无贤才投奔……","info");
}
useAction();
}

function executeBattle(gi,tid,tacticId){
closeModal();
let p=G.factions[G.player];
let gen=p.generals[gi];
let tactic=TACTICS.find(t=>t.id===tacticId);
let region=G.regions[tid];
let defFid=region.owner;
let defFaction=defFid?G.factions[defFid]:null;

// attacker power
let atkTroops=Math.min(p.troops,Math.floor(p.troops*0.7));
let atkPower=atkTroops*(gen.atk/50)*tactic.atkMul;
// advisor boost
let bestAdvisor=p.advisors.reduce((best,a)=>a.int>best?a.int:best,0);
atkPower*=(1+bestAdvisor/500);

// defender
let defPower=0,defGen=null,defTactic=null;
if(defFaction&&defFaction.generals.length>0){
defGen=defFaction.generals[Math.floor(Math.random()*defFaction.generals.length)];
defTactic=TACTICS[Math.floor(Math.random()*TACTICS.length)];
let defTroops=Math.min(defFaction.troops,Math.floor(defFaction.troops*0.6));
defPower=defTroops*(defGen.def/50)*defTactic.defMul;
defPower*=(1+region.defense/10);
}else if(!defFid){
// neutral city - garrison
defPower=1000+region.defense*500;
}else{
defPower=500;
}

// tactic matchup
if(tactic.beats===defTactic?.id)atkPower*=1.3;
if(tactic.losesTo===defTactic?.id)defPower*=1.3;

// randomness
atkPower*=(0.85+Math.random()*0.3);
defPower*=(0.85+Math.random()*0.3);

let victory=atkPower>defPower;
let ratio=victory?atkPower/defPower:defPower/atkPower;
let atkLoss=Math.floor(atkTroops*(victory?0.1+0.2/ratio:0.3+0.2*ratio));
let defLoss=defFaction?Math.floor(defFaction.troops*(victory?0.3+0.2*ratio:0.1+0.2/ratio)):0;

atkLoss=Math.min(atkLoss,p.troops-100);
if(defFaction)defLoss=Math.min(defLoss,defFaction.troops);

// narrative
let narr=BATTLE_NARRATIVES[tacticId];
let narrativeText=narr[Math.floor(Math.random()*narr.length)];
let battleHTML=`<div class="battle-narrative">
<span class="phase">【${gen.name}率军出征${region.name}】</span>
${narrativeText}
<span class="phase">【战术：${tactic.name} ${defTactic?'vs '+defTactic.name:''}】</span>`;

if(victory){
battleHTML+=`<span class="phase" style="color:var(--green)">🎉 大胜！攻克${region.name}！</span>
我军损失${atkLoss.toLocaleString()}人${defFaction?`，歼敌${defLoss.toLocaleString()}人`:''}。`;
p.troops-=atkLoss;
if(defFaction){defFaction.troops-=defLoss;defFaction.territories=defFaction.territories||[];
let idx=defFaction.territories?defFaction.territories.indexOf(tid):-1;}
region.owner=G.player;
addLog(`⚔️ ${gen.name}攻克${region.name}！损失${atkLoss}人`,"battle");
}else{
battleHTML+=`<span class="phase" style="color:var(--red)">💀 败退！未能攻克${region.name}。</span>
我军损失${atkLoss.toLocaleString()}人。`;
p.troops-=atkLoss;
if(defFaction)defFaction.troops=Math.max(100,defFaction.troops-Math.floor(defLoss*0.3));
addLog(`💀 ${gen.name}进攻${region.name}失败，损失${atkLoss}人`,"battle");
}
battleHTML+=`</div>`;

// check win
checkVictory();
useAction();
// show battle result
let content=document.getElementById('content');
content.innerHTML=battleHTML+`<button onclick="render()" style="margin-top:16px;width:100%">继续</button>`;
}

function doStratagem(type){
closeModal();
let p=G.factions[G.player];
let bestAdv=p.advisors.reduce((b,a)=>a.int>b?a.int:b,50);
let enemies=Object.keys(G.factions).filter(f=>f!==G.player&&Object.values(G.regions).some(r=>r.owner===f));
if(enemies.length===0){addLog("无目标可用计","info");useAction();return}
let target=enemies[Math.floor(Math.random()*enemies.length)];
let t=G.factions[target];
let chance=bestAdv/120;

if(type==='spy'){
addLog(`🕵️ 探得${FACTIONS[target].lord}：兵力${t.troops}，粮草${t.food}，金币${t.gold}，民心${t.morale}`,"good");
}else if(type==='sabotage'){
if(Math.random()<chance){
let lost=Math.floor(t.food*0.3);t.food-=lost;
addLog(`🔥 成功烧毁${FACTIONS[target].lord}粮草${lost}！`,"good");
}else addLog("破坏行动被敌方识破，无功而返","info");
}else if(type==='defect'){
if(Math.random()<chance*0.5&&t.generals.length>0){
let gi=Math.floor(Math.random()*t.generals.length);
let gen=t.generals.splice(gi,1)[0];
p.generals.push(gen);
addLog(`🎉 ${gen.name}被策反，归入麾下！`,"good");
}else addLog("策反失败，敌将忠心不二","info");
}else if(type==='rumor'){
if(Math.random()<chance){
t.morale=Math.max(10,t.morale-10);
addLog(`📢 流言四起，${FACTIONS[target].lord}民心下降！`,"good");
}else addLog("流言未能奏效","info");
}
useAction();
}

// ===== AI =====
function aiTurn(fid){
let f=G.factions[fid];
let myTerr=Object.values(G.regions).filter(r=>r.owner===fid);
if(myTerr.length===0)return;

// collect income
f.food+=myTerr.reduce((s,t)=>s+t.foodProd,0);
f.gold+=myTerr.reduce((s,t)=>s+t.goldProd,0);
// consume food
let consumption=Math.floor(f.troops*0.1);
f.food-=consumption;
if(f.food<0){f.troops=Math.max(100,f.troops+f.food*2);f.food=0}

for(let a=0;a<2;a++){
let r=Math.random();
if(r<0.25&&f.gold>=400){
// recruit
f.gold-=400;f.troops+=1500+Math.floor(Math.random()*1000);
}else if(r<0.45){
// farm
myTerr.forEach(t=>{t.foodProd+=8});f.food+=300;
}else if(r<0.6){
// develop
myTerr.forEach(t=>{t.goldProd+=8});f.morale=Math.min(100,f.morale+3);
}else if(r<0.85&&f.troops>3000&&f.generals.length>0){
// attack
let targets=new Set();
myTerr.forEach(t=>{let reg=REGIONS.find(x=>x.id===t.id);reg.adj.forEach(adj=>{
let owner=G.regions[adj].owner;
if(owner!==fid){
// respect alliances
if(!G.allies[fid]||!G.allies[fid][owner]||G.allies[fid][owner]<=0)
targets.add(adj);
}
})});
if(targets.size>0){
let tarr=[...targets];
let tid=tarr[Math.floor(Math.random()*tarr.length)];
let reg=G.regions[tid];
let defOwner=reg.owner;
let defFaction=defOwner?G.factions[defOwner]:null;
let gen=f.generals[Math.floor(Math.random()*f.generals.length)];
let atkPower=f.troops*0.5*(gen.atk/60)*(0.85+Math.random()*0.3);
let defPower=defFaction?(defFaction.troops*0.4*(1+reg.defense/10)*(0.85+Math.random()*0.3)):(800+reg.defense*400);
if(atkPower>defPower){
let loss=Math.floor(f.troops*0.08);
f.troops-=loss;
if(defFaction)defFaction.troops=Math.max(100,defFaction.troops-Math.floor(defFaction.troops*0.2));
reg.owner=fid;
addLog(`${FACTIONS[fid].lord}攻克了${reg.name}！`,"battle");
}else{
f.troops=Math.max(100,f.troops-Math.floor(f.troops*0.12));
addLog(`${FACTIONS[fid].lord}进攻${reg.name}失败`,"info");
}
}
}else{
// recruit talent
if(G.availableHeroes.length>0&&Math.random()<0.15){
let hi=Math.floor(Math.random()*G.availableHeroes.length);
let h=G.availableHeroes.splice(hi,1)[0];
if(h.type==='general')f.generals.push(h);else f.advisors.push(h);
addLog(`${FACTIONS[fid].lord}招募了${h.name}`,"info");
}
}
}
}

// ===== EVENTS =====
function randomEvent(){
let p=G.factions[G.player];
let myTerr=Object.values(G.regions).filter(r=>r.owner===G.player);
if(myTerr.length===0)return;
let r=Math.random();
if(r<0.12){
let loss=Math.floor(p.food*0.2);p.food=Math.max(0,p.food-loss);
addLog(`🌊 天灾降临！损失粮草${loss}`,"event");
}else if(r<0.24){
let gain=Math.floor(1000+Math.random()*2000);p.food+=gain;
addLog(`🌾 风调雨顺，丰收！获得粮草${gain}`,"event");
}else if(r<0.32&&G.availableHeroes.length>0){
let hi=Math.floor(Math.random()*G.availableHeroes.length);
let h=G.availableHeroes[hi];
showModal(`<h2>🎉 人才来投</h2><p>${h.name}慕名前来，是否收留？</p>
<p style="color:var(--text-dim)">${h.type==='general'?`武${h.atk} 防${h.def} 智${h.int} 速${h.spd}`:`智${h.int} 政${h.pol} 魅${h.cha}`}</p>
<div class="modal-actions">
<button onclick="acceptHero(${hi})">接纳</button>
<button onclick="closeModal()">婉拒</button>
</div>`);
}else if(r<0.40){
let loss=Math.floor(p.troops*0.05);p.troops=Math.max(100,p.troops-loss);
addLog(`😷 瘟疫蔓延，损失士兵${loss}人`,"event");
}else if(r<0.48&&myTerr.length>1){
let city=myTerr[Math.floor(Math.random()*myTerr.length)];
p.morale=Math.max(10,p.morale-8);
addLog(`⚠️ ${city.name}发生叛乱！民心下降`,"event");
}else if(r<0.55){
let gain=Math.floor(300+Math.random()*700);p.gold+=gain;
addLog(`🐪 商队经过，贸易获利${gain}金币`,"event");
}
}

function acceptHero(hi){
closeModal();
let h=G.availableHeroes.splice(hi,1)[0];
let p=G.factions[G.player];
if(h.type==='general')p.generals.push(h);else p.advisors.push(h);
addLog(`🎉 ${h.name}加入麾下！`,"good");
render();
}

// ===== TURN =====
function endTurn(){
let p=G.factions[G.player];
let myTerr=Object.values(G.regions).filter(r=>r.owner===G.player);

// income
p.food+=myTerr.reduce((s,t)=>s+t.foodProd,0);
p.gold+=myTerr.reduce((s,t)=>s+t.goldProd,0);
// consumption
let consumption=Math.floor(p.troops*0.1);
p.food-=consumption;
if(p.food<0){
let troopLoss=Math.floor(-p.food/2);
p.troops=Math.max(100,p.troops-troopLoss);
addLog(`⚠️ 粮草耗尽，饿死士兵${troopLoss}人！`,"battle");
p.food=0;
}

// decay alliances
for(let fid in G.allies){
for(let fid2 in G.allies[fid]){
if(G.allies[fid][fid2]>0)G.allies[fid][fid2]--;
}
}

// AI turns
for(let fid in G.factions){
if(fid!==G.player)aiTurn(fid);
}

// advance season
G.season++;
if(G.season>=4){G.season=0;G.year++}
G.turn++;
G.actionsLeft=2;

// random event
randomEvent();

// check victory
checkVictory();
saveGame();
render();
}

function checkVictory(){
let totalRegions=REGIONS.length;
let myRegions=Object.values(G.regions).filter(r=>r.owner===G.player).length;
if(myRegions===totalRegions){
G.gameOver=true;
}else if(myRegions>=Math.floor(totalRegions*0.7)){
// check if highest military
let highest=true;
for(let fid in G.factions){
if(fid!==G.player&&G.factions[fid].troops>G.factions[G.player].troops)highest=false;
}
if(highest)G.gameOver=true;
}
}

// ===== INIT =====
showTitleScreen();
</script>
</body>
