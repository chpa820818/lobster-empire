<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文明纪元 — 从起源到星辰</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a12;--panel:#12121e;--border:#2a2a3a;--gold:#d4a84b;--gold-dim:#8a6a2a;
--text:#e0dcd0;--text-dim:#8a8a7a;--accent:#4a9eff;--danger:#ff4a4a;--success:#4aff6a;
--era-stone:#6b5b3a;--era-bronze:#b8860b;--era-iron:#708090;--era-classical:#f5f0e0;
--era-medieval:#8b0000;--era-renaissance:#1a3a6a;--era-exploration:#0a5a3a;
--era-industrial:#4a4a5a;--era-modern:#1a1a2a;--era-info:#0a1a3a;
}
html,body{height:100%;font-family:'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* START SCREEN */
#startScreen{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a12 0%,#1a1020 50%,#0a0a12 100%)}
#startScreen h1{font-size:3em;color:var(--gold);text-shadow:0 0 30px rgba(212,168,75,0.3);margin-bottom:0.2em;letter-spacing:0.1em}
#startScreen .subtitle{color:var(--text-dim);font-size:1.1em;margin-bottom:2em}
.start-phase{display:none;flex-direction:column;align-items:center;width:100%;max-width:900px}
.start-phase.active{display:flex}
#mapSelect{position:relative;width:860px;height:440px;background:#0d1117;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:1em 0}
#mapSelect canvas{width:100%;height:100%}
.city-tooltip{position:absolute;background:rgba(10,10,18,0.95);border:1px solid var(--gold);padding:8px 12px;border-radius:6px;pointer-events:none;display:none;font-size:0.85em;z-index:10}
#civNameInput{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:10px 20px;font-size:1.2em;border-radius:8px;text-align:center;width:300px;margin:0.5em 0}
#civNameInput:focus{outline:none;border-color:var(--gold)}
.btn{padding:10px 28px;border-radius:8px;font-size:1em;transition:all 0.2s}
.btn-gold{background:linear-gradient(135deg,var(--gold),#b8860b);color:#1a1a0a;font-weight:bold}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(212,168,75,0.4)}
.btn-gold:disabled{opacity:0.4;transform:none;box-shadow:none;cursor:default}
.region-info{color:var(--gold);font-size:0.95em;min-height:1.5em;margin:0.5em 0}
.start-actions{display:flex;gap:12px;margin-top:1em;align-items:center}
#loadBtn{color:var(--text-dim);text-decoration:underline;font-size:0.9em}
#loadBtn:hover{color:var(--text)}

/* GAME LAYOUT */
#gameScreen{display:none;height:100vh;width:100vw}
#gameScreen.active{display:grid;grid-template-columns:260px 1fr 280px;grid-template-rows:48px 1fr 36px}
#topBar{grid-column:1/-1;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:16px;font-size:0.85em}
#topBar .era-badge{background:var(--gold-dim);color:#fff;padding:2px 10px;border-radius:4px;font-weight:bold}
#topBar .date{color:var(--gold);font-weight:bold;font-size:1.1em}
.speed-controls{display:flex;gap:4px;margin-left:auto}
.speed-controls button{padding:4px 10px;border-radius:4px;font-size:0.85em;background:var(--border);transition:background 0.2s}
.speed-controls button.active{background:var(--gold);color:#1a1a0a}
.speed-controls button:hover{background:var(--gold-dim)}
.res-bar{display:flex;gap:14px;margin-left:16px}
.res-item{display:flex;align-items:center;gap:3px}
.res-item span:first-child{font-size:1em}

/* LEFT SIDEBAR */
#sidebar{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:10px;font-size:0.82em}
.side-section{margin-bottom:12px}
.side-section h3{color:var(--gold);font-size:0.9em;border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:6px}
.stat-row{display:flex;justify-content:space-between;padding:2px 0}
.stat-val{color:var(--gold)}
.diplo-row{display:flex;justify-content:space-between;padding:2px 0;font-size:0.9em}
.diplo-row .war{color:var(--danger)}.diplo-row .ally{color:var(--success)}.diplo-row .neutral{color:var(--text-dim)}
.queue-item{background:var(--bg);border-radius:4px;padding:4px 6px;margin:3px 0;font-size:0.85em;display:flex;justify-content:space-between}
.queue-item .pbar{width:50px;height:6px;background:var(--border);border-radius:3px;margin-top:4px}
.queue-item .pfill{height:100%;background:var(--gold);border-radius:3px;transition:width 0.3s}
.city-list-item{padding:3px 4px;cursor:pointer;border-radius:3px;display:flex;justify-content:space-between}
.city-list-item:hover{background:var(--border)}
.city-list-item.selected{background:rgba(212,168,75,0.15);border-left:2px solid var(--gold)}

/* CENTER */
#center{overflow:hidden;display:flex;flex-direction:column}
#tabs{display:flex;background:var(--panel);border-bottom:1px solid var(--border)}
#tabs button{padding:8px 16px;font-size:0.85em;border-bottom:2px solid transparent;transition:all 0.2s}
#tabs button.active{color:var(--gold);border-bottom-color:var(--gold)}
#tabs button:hover{color:var(--gold)}
#tabContent{flex:1;overflow-y:auto;padding:12px}

/* MAP TAB */
#worldMap{position:relative;width:100%;height:100%;min-height:400px}
#worldMap canvas{width:100%;height:100%}

/* ACTION PANEL */
.action-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.action-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all 0.2s}
.action-card:hover{border-color:var(--gold);transform:translateY(-1px)}
.action-card.disabled{opacity:0.4;cursor:default;transform:none}
.action-card h4{color:var(--gold);margin-bottom:4px;font-size:0.95em}
.action-card p{font-size:0.8em;color:var(--text-dim)}
.action-card .cost{font-size:0.75em;color:var(--accent);margin-top:4px}

/* TECH TREE */
.tech-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.tech-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:0.85em;transition:all 0.2s;cursor:pointer}
.tech-card.researched{border-color:var(--success);background:rgba(74,255,106,0.05)}
.tech-card.available{border-color:var(--accent)}
.tech-card.locked{opacity:0.4}
.tech-card.researching{border-color:var(--gold);animation:pulse 2s infinite}
.tech-card h5{margin-bottom:4px}.tech-card p{font-size:0.75em;color:var(--text-dim)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(212,168,75,0)}50%{box-shadow:0 0 12px rgba(212,168,75,0.3)}}

/* WONDER */
.wonder-card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;margin:6px 0}
.wonder-card.built{border-color:var(--gold);background:rgba(212,168,75,0.05)}
.wonder-card.taken{opacity:0.5}
.wonder-card h4{color:var(--gold)}
.wonder-card .owner{font-size:0.8em;color:var(--success)}

/* LOG */
#logPanel{font-size:0.8em}
.log-entry{padding:4px 0;border-bottom:1px solid rgba(42,42,58,0.5)}
.log-entry .log-date{color:var(--text-dim);margin-right:8px;font-size:0.85em}
.log-entry.event{color:var(--gold)}.log-entry.battle{color:var(--danger)}.log-entry.tech{color:var(--accent)}.log-entry.diplo{color:var(--success)}

/* RIGHT SIDEBAR */
#rightPanel{background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:10px;font-size:0.82em}
.detail-title{color:var(--gold);font-size:1.1em;margin-bottom:8px}

/* BOTTOM BAR */
#bottomBar{grid-column:1/-1;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 16px;font-size:0.75em;color:var(--text-dim);gap:16px}

/* MODAL / OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:var(--panel);border:1px solid var(--gold);border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.modal h2{color:var(--gold);margin-bottom:12px}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap}
.modal-actions button{padding:8px 16px;border-radius:6px;font-size:0.9em}

/* ERA TRANSITION */
#eraOverlay{position:fixed;inset:0;z-index:900;display:none;align-items:center;justify-content:center;flex-direction:column}
#eraOverlay.show{display:flex;animation:eraFadeIn 1s ease}
#eraOverlay .era-title{font-size:3em;color:var(--gold);text-shadow:0 0 40px rgba(212,168,75,0.5);animation:eraSlide 1.5s ease}
#eraOverlay .era-desc{color:var(--text);font-size:1.1em;margin-top:16px;text-align:center;max-width:500px}
#eraOverlay .era-dismiss{margin-top:32px}
@keyframes eraFadeIn{from{opacity:0}to{opacity:1}}
@keyframes eraSlide{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}

/* BATTLE */
.battle-panel{text-align:center}
.battle-panel h3{color:var(--danger);font-size:1.3em;margin-bottom:8px}
.battle-panel .vs{font-size:2em;color:var(--gold);margin:8px 0}
.battle-strats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:12px 0}
.battle-strats button{padding:10px;border-radius:6px;background:var(--bg);border:1px solid var(--border);transition:all 0.2s;font-size:0.85em}
.battle-strats button:hover{border-color:var(--gold);background:rgba(212,168,75,0.1)}
.battle-narrative{background:var(--bg);border-radius:8px;padding:12px;margin:12px 0;font-style:italic;line-height:1.6;text-align:left}

/* RESPONSIVE */
@media(max-width:900px){
#gameScreen.active{grid-template-columns:1fr;grid-template-rows:48px auto 1fr 36px}
#sidebar,#rightPanel{display:none}
}
</style>
</head>
<body>
<!-- Password Lock -->
<div id="pwLock" style="position:fixed;inset:0;z-index:99999;background:#0a0a12;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI','Microsoft YaHei',sans-serif">
<div style="font-size:2.5em;color:#d4a84b;margin-bottom:10px">🔒 文明纪元</div>
<div style="color:#8a8a7a;margin-bottom:20px">请输入密码进入游戏</div>
<input id="pwInput" type="password" placeholder="输入密码..." style="background:#12121e;border:1px solid #2a2a3a;color:#e0dcd0;padding:12px 20px;font-size:1.2em;border-radius:8px;text-align:center;width:260px;outline:none" onkeydown="if(event.key==='Enter')checkPw()">
<button onclick="checkPw()" style="margin-top:12px;padding:10px 30px;font-size:1em;background:linear-gradient(180deg,#1a1a2a,#12121e);border:1px solid #d4a84b;color:#d4a84b;border-radius:6px;cursor:pointer">进入</button>
<div id="pwErr" style="color:#ff4a4a;margin-top:10px;display:none">密码错误</div>
</div>
<script>
async function checkPw(){
const pw=document.getElementById('pwInput').value;
const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
if(hash==='e6f549c3d50663fb36584b756d176a5aa1397c8edec68a18858c3a9418aae952'){
document.getElementById('pwLock').style.display='none';
sessionStorage.setItem('civ_auth','1');
}else{
document.getElementById('pwErr').style.display='block';
document.getElementById('pwInput').style.borderColor='#ff4a4a';
setTimeout(()=>{document.getElementById('pwErr').style.display='none';document.getElementById('pwInput').style.borderColor='#2a2a3a';},2000);
}
}
if(sessionStorage.getItem('civ_auth')==='1')document.addEventListener('DOMContentLoaded',()=>{document.getElementById('pwLock').style.display='none';});
</script>

// adjacency: auto-compute based on distance
function computeAdj(){
const adj={};
const thresh=0.12;
for(const c of WORLD_CITIES){
adj[c.id]=[];
for(const d of WORLD_CITIES){
if(c.id===d.id)continue;
const dx=c.x-d.x,dy=c.y-d.y;
if(Math.sqrt(dx*dx+dy*dy)<thresh) adj[c.id].push(d.id);
}
}
return adj;
}
const ADJACENCY=computeAdj();

owner: c.id===startCityId?'player': aiCivs.find(a=>a.cities.includes(c.id))?.id||null,

};
}

const relations={};
for(const ai of aiCivs) relations[ai.id]='neutral';

return {

startCityId,
cities,

// ========== TIME UTILS ==========
function gameTimeToDate(gt){
// gt = seconds from year 0 (negative = BC)
const totalDays = gt/(24*3600);
const year = Math.floor(totalDays/365.25);
const dayOfYear = Math.floor(((totalDays/365.25)-year)*365.25);
const month = Math.min(12,Math.floor(dayOfYear/30.4)+1);
const day = Math.max(1,Math.floor(dayOfYear%30.4)+1);
if(year<0) return `${-year} BC ${month}月${day}日`;
return `${year} AD ${month}月${day}日`;
}
function gameYear(gt){ return gt/(365.25*24*3600); }
function yearsToSeconds(y){ return y*365.25*24*3600; }

// ========== RENDERING ==========
function drawMap(canvas, cities, isStart){
const ctx=canvas.getContext('2d');
const W=canvas.width, H=canvas.height;
ctx.clearRect(0,0,W,H);

// Background - simple world
ctx.fillStyle='#0d1520';
ctx.fillRect(0,0,W,H);

// Draw landmasses (simplified)
ctx.fillStyle='#1a2a1a';
ctx.globalAlpha=0.3;
// Rough continents
const lands=[
[[0.05,0.25],[0.22,0.20],[0.22,0.55],[0.15,0.70],[0.08,0.55]], // Americas
[[0.25,0.25],[0.42,0.20],[0.45,0.35],[0.42,0.55],[0.35,0.70],[0.28,0.55],[0.25,0.40]], // Africa+Europe
[[0.42,0.18],[0.55,0.15],[0.58,0.30],[0.55,0.42],[0.45,0.50],[0.42,0.35]], // Middle East
[[0.55,0.20],[0.75,0.18],[0.80,0.30],[0.78,0.45],[0.72,0.52],[0.60,0.48],[0.55,0.35]], // Asia
[[0.75,0.60],[0.88,0.55],[0.90,0.72],[0.78,0.72]], // Oceania
];
for(const land of lands){
ctx.beginPath();
ctx.moveTo(land[0][0]*W,land[0][1]*H);
for(let i=1;i<land.length;i++) ctx.lineTo(land[i][0]*W,land[i][1]*H);
ctx.closePath();ctx.fill();
}
ctx.globalAlpha=1;

// Draw adjacency lines
if(!isStart && G){
ctx.strokeStyle='rgba(100,100,120,0.15)';
ctx.lineWidth=1;
const drawn=new Set();
for(const cid in ADJACENCY){
for(const nid of ADJACENCY[cid]){
const key=[cid,nid].sort().join('-');
if(drawn.has(key))continue;
drawn.add(key);
const a=cities[cid],b=cities[nid];
if(!a||!b)continue;
ctx.beginPath();
ctx.moveTo(a.x*W,a.y*H);
ctx.lineTo(b.x*W,b.y*H);
ctx.stroke();
}
}
}

// Draw cities
const cityArr = isStart? WORLD_CITIES : Object.values(cities);
for(const c of cityArr){
const cx=c.x*W, cy=c.y*H;
const r = isStart? 5 : (c.owner==='player'?7:(c.owner?6:4));
let color = '#555';
if(isStart){
color = startSelectedCity===c.id?'#d4a84b':'#888';
} else if(G){
if(c.owner==='player') color=G.color;
else if(c.owner){
const ai=G.aiCivs.find(a=>a.id===c.owner);
color=ai?ai.color:'#555';
} else color='#444';
}

ctx.beginPath();
ctx.arc(cx,cy,r,0,Math.PI*2);
ctx.fillStyle=color;
ctx.fill();
if((!isStart && selectedCity===c.id)||(isStart && startSelectedCity===c.id)){
ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
}

// City name
if(r>=5){
ctx.fillStyle='rgba(255,255,255,0.7)';
ctx.font='9px sans-serif';
ctx.textAlign='center';
ctx.fillText(c.name||c.id,cx,cy-r-3);
}
}
}

// ========== GAME INIT ==========
function initGame(){
resizeCanvas();
window.addEventListener('resize',resizeCanvas);
updateAll();
lastTime=performance.now();
animId=requestAnimationFrame(gameLoop);
}

function resizeCanvas(){
const c=document.getElementById('gameCanvas');
const p=c.parentElement;
c.width=p.clientWidth;
c.height=p.clientHeight;
}

// ========== GAME LOOP ==========
function gameLoop(now){
if(!G){animId=requestAnimationFrame(gameLoop);return;}
const dt=(now-lastTime)/1000; // real seconds elapsed
lastTime=now;

if(G.speed>0 && !G.paused && !modalOpen){
const gameSeconds = dt * 100 * G.speed; // 100x base ratio
G.gameTime += gameSeconds;

// Process queues
processQueues(gameSeconds);
// AI
processAI(gameSeconds);
// Events
processEvents();
// Era check
checkEra();
// Resource generation
generateResources(gameSeconds);
}

// Render
if(now%2<1||true){ // every frame for smooth
updateTopBar();
if(currentTab==='map') drawMap(document.getElementById('gameCanvas'),G.cities,false);
}

animId=requestAnimationFrame(gameLoop);
}

function generateResources(dt){
const p=G.player;
const yearFrac=dt/(365.25*24*3600);
const cityCount=p.cities.length;
// Per-city income
for(const cid of p.cities){
const city=G.cities[cid];
const t=TERRAINS[city.terrain];
const base=1+cityCount*0.1;
p.food += (3+t.bonus.food*0.1+(p.terrainBonus.food||0)*0.05)*yearFrac*base;
p.gold += (2+t.bonus.gold*0.1+(p.terrainBonus.gold||0)*0.05)*yearFrac*base;
p.science += (1+(p.terrainBonus.science||0)*0.05)*yearFrac*base;
p.culture += (0.5+(p.terrainBonus.culture||0)*0.05)*yearFrac*base;
p.faith += (0.2+(p.terrainBonus.faith||0)*0.03)*yearFrac*base;
city.pop += (0.5+p.food*0.001)*yearFrac;
}
// Tech bonuses
for(const tid of p.techs){
const tech=findTech(tid);
if(tech&&tech.bonus){
if(tech.bonus.food) p.food+=tech.bonus.food*0.01*yearFrac;
if(tech.bonus.gold) p.gold+=tech.bonus.gold*0.01*yearFrac;
if(tech.bonus.science) p.science+=tech.bonus.science*0.01*yearFrac;
if(tech.bonus.culture) p.culture+=tech.bonus.culture*0.01*yearFrac;
if(tech.bonus.mil) p.mil+=tech.bonus.mil*0.005*yearFrac;
if(tech.bonus.faith) p.faith+=tech.bonus.faith*0.01*yearFrac;
if(tech.bonus.happiness) p.happiness=Math.min(100,p.happiness+tech.bonus.happiness*0.001*yearFrac);
}
}
// Gov bonuses
const gov=GOVS.find(g=>g.id===p.gov);
if(gov&&gov.bonus){
if(gov.bonus.food) p.food+=gov.bonus.food*0.005*yearFrac;
if(gov.bonus.gold) p.gold+=gov.bonus.gold*0.005*yearFrac;
if(gov.bonus.mil) p.mil+=gov.bonus.mil*0.003*yearFrac;
if(gov.bonus.happiness) p.happiness=Math.min(100,p.happiness+gov.bonus.happiness*0.001*yearFrac);
if(gov.bonus.science) p.science+=gov.bonus.science*0.005*yearFrac;
}
// Wonder bonuses
for(const wid of p.wondersBuilt){
const w=WONDERS.find(x=>x.id===wid);
if(w&&w.bonus){
Object.entries(w.bonus).forEach(([k,v])=>{
if(k==='happiness') p.happiness=Math.min(100,p.happiness+v*0.001*yearFrac);
else if(p[k]!==undefined) p[k]+=v*0.01*yearFrac;
});
}
}
// Pop
p.pop=Math.max(10,Math.floor(p.cities.reduce((s,cid)=>s+G.cities[cid].pop,0)));
// Clamp
p.gold=Math.max(0,p.gold);
p.food=Math.max(0,p.food);
p.happiness=Math.max(0,Math.min(100,p.happiness));
}

function processQueues(dt){
const yearSec=365.25*24*3600;
for(let i=G.player.queue.length-1;i>=0;i--){
const q=G.player.queue[i];
q.elapsed+=dt;
if(q.elapsed>=q.duration){
completeAction(q);
G.player.queue.splice(i,1);
}
}
}

function completeAction(q){
const p=G.player;
switch(q.type){
case 'research':
p.techs.push(q.techId);
const tech=findTech(q.techId);
addLog(`研究完成: ${tech.name}!`,'tech');
if(tech.bonus){
Object.entries(tech.bonus).forEach(([k,v])=>{
if(k==='pop') p.pop+=v;
else if(k==='happiness') p.happiness=Math.min(100,p.happiness+v);
else if(p[k]!==undefined) p[k]+=v;
});
}
break;
case 'wonder':
if(!G.wondersClaimed[q.wonderId]){
G.wondersClaimed[q.wonderId]='player';
p.wondersBuilt.push(q.wonderId);
const w=WONDERS.find(x=>x.id===q.wonderId);
addLog(`奇迹建成: ${w.emoji} ${w.name}!`,'event');
}
break;
case 'military':
p.mil+=q.amount;
addLog(`军事建设完成: 军力+${q.amount}`,'event');
break;
case 'expand':
if(q.cityId && G.cities[q.cityId]){
const city=G.cities[q.cityId];
if(!city.owner){
city.owner='player';
p.cities.push(q.cityId);
city.garrison=10;
addLog(`殖民成功: ${city.name} 加入版图!`,'event');
}
}
break;
case 'culture':
p.culture+=q.amount;
addLog(`文化建设完成: 文化+${q.amount}`,'event');
break;
case 'reform':
p.gov=q.govId;
addLog(`政体变更为: ${GOVS.find(g=>g.id===q.govId).name}`,'event');
break;
}
updateSidebar();
}

function findTech(tid){
for(const era of Object.values(TECH_TREE)){
const t=era.find(x=>x.id===tid);
if(t)return t;
}
return null;
}

function findTechEra(tid){
for(const [era,techs] of Object.entries(TECH_TREE)){
if(techs.find(x=>x.id===tid)) return era;
}
return null;
}

// ========== AI ==========
function processAI(dt){
const yearFrac=dt/(365.25*24*3600);
for(const ai of G.aiCivs){
if(ai.cities.length===0) continue;
// Resource gen
const cc=ai.cities.length;
ai.food+=(2+cc)*yearFrac;
ai.gold+=(1.5+cc)*yearFrac;
ai.science+=(1+cc*0.5)*yearFrac*(1+ai.eraIdx*0.1);
ai.culture+=(0.5+cc*0.3)*yearFrac;
ai.mil+=(0.3+cc*0.1)*yearFrac;
ai.pop=Math.max(10,ai.pop+(0.5+cc*0.2)*yearFrac);
ai.happiness=Math.max(20,Math.min(90,ai.happiness));

// AI actions (every ~20 game years)
ai.lastEventTime = ai.lastEventTime||G.gameTime;
if(G.gameTime-ai.lastEventTime > yearsToSeconds(20+Math.random()*30)){
ai.lastEventTime=G.gameTime;
aiTakeAction(ai);
}
}
}

function aiTakeAction(ai){
const r=Math.random();
// Research
if(r<0.35){
const era=ERAS[ai.eraIdx].id;
const available=(TECH_TREE[era]||[]).filter(t=>!ai.techs.includes(t.id));
if(available.length>0){
const t=available[Math.floor(Math.random()*available.length)];
ai.techs.push(t.id);
// Check era advance
const eraTechs=TECH_TREE[era]||[];
const researched=eraTechs.filter(t=>ai.techs.includes(t.id)).length;
if(researched>=Math.ceil(eraTechs.length*0.6)&&ai.eraIdx<ERAS.length-1){
ai.eraIdx++;
}
}
}
// Expand
else if(r<0.55){
for(const cid of ai.cities){
const adj=ADJACENCY[cid]||[];
for(const nid of adj){
const nc=G.cities[nid];
if(!nc.owner){
nc.owner=ai.id;
ai.cities.push(nid);
nc.garrison=8;
return;
}
}
}
}
// Attack
else if(r<0.7 && ai.mil>30){
for(const cid of ai.cities){
const adj=ADJACENCY[cid]||[];
for(const nid of adj){
const nc=G.cities[nid];
if(nc.owner && nc.owner!==ai.id && nc.owner!=='player'){
// AI vs AI combat
const attStr=ai.mil*0.3;
const defStr=nc.garrison*2;
if(attStr>defStr*0.8){
const defAi=G.aiCivs.find(a=>a.id===nc.owner);
nc.owner=ai.id;
ai.cities.push(nid);
if(defAi){
defAi.cities=defAi.cities.filter(c=>c!==nid);
}
ai.mil-=attStr*0.3;
nc.garrison=Math.floor(attStr*0.2);
addLog(`${ai.name} 攻占了 ${nc.name}!`,'battle');
return;
}
}
// Attack player?
if(nc.owner==='player' && ai.mil>60 && (ai.relations||{}).player==='war'){
triggerAIAttack(ai,nid);
return;
}
}
}
}
// Build wonder
else if(r<0.8){
const era=ERAS[ai.eraIdx].id;
const available=WONDERS.filter(w=>w.era===era&&!G.wondersClaimed[w.id]);
if(available.length>0 && ai.gold>available[0].cost*0.5){
const w=available[0];
G.wondersClaimed[w.id]=ai.id;
ai.wondersBuilt.push(w.id);
addLog(`${ai.name} 建成了 ${w.emoji} ${w.name}!`,'event');
}
}
// Military build
else{
ai.mil+=10+ai.eraIdx*3;
}
}

function triggerAIAttack(ai, targetCityId){
const city=G.cities[targetCityId];
const attStr=ai.mil*0.4;
const defStr=city.garrison*2+G.player.mil*0.1;
// Auto-pause for player battles
G.paused=true;
G.speed=0;
updateSpeedBtns();
showBattleModal(ai, targetCityId, attStr, defStr, true);
}

// ========== EVENTS ==========
function processEvents(){
if(G.gameTime>=G.nextEventTime){
const eraId=ERAS[G.player.eraIdx].id;
const pool=EVENT_POOL[eraId]||EVENT_POOL.stone;
const evt=pool[Math.floor(Math.random()*pool.length)];
applyEvent(evt);
// Next event in 30-80 game years
G.nextEventTime=G.gameTime+yearsToSeconds(30+Math.random()*50);
}
}

function applyEvent(evt){
const p=G.player;
Object.entries(evt.effect).forEach(([k,v])=>{
if(k==='pop') p.pop=Math.max(10,p.pop+v);
else if(k==='happiness') p.happiness=Math.max(0,Math.min(100,p.happiness+v));
else if(p[k]!==undefined) p[k]=Math.max(0,p[k]+v);
});
addLog(`[事件] ${evt.name}: ${evt.desc}`,evt.type==='disaster'?'battle':'event');
// Pause for major events
if(Math.abs(Object.values(evt.effect).reduce((a,b)=>a+Math.abs(b),0))>30){
G.paused=true;G.speed=0;
updateSpeedBtns();
showEventModal(evt);
}
}

function showEventModal(evt){
modalOpen=true;
const colors={disaster:'#ff4a4a',good:'#4aff6a',great_person:'#d4a84b',golden_age:'#ffd700',religion:'#9b59b6'};
const div=document.createElement('div');
div.className='modal-overlay';
div.id='eventModal';
div.innerHTML=`<div class="modal">
<h2 style="color:${colors[evt.type]||'var(--gold)'}">${evt.name}</h2>
<p style="margin:12px 0;line-height:1.6">${evt.desc}</p>
<p style="font-size:0.85em;color:var(--text-dim)">影响: ${Object.entries(evt.effect).map(([k,v])=>`${k} ${v>0?'+':''}${v}`).join(', ')}</p>
<div class="modal-actions"><button class="btn btn-gold" onclick="closeModal('eventModal')">知道了</button></div>
</div>`;
document.body.appendChild(div);
}

function closeModal(id){
const el=document.getElementById(id);
if(el)el.remove();
modalOpen=false;
G.paused=false;
G.speed=1;
updateSpeedBtns();
}

// ========== ERA ==========
function checkEra(){

const techs=TECH_TREE[curEra.id]||[];

function setSpeed(s){

G.paused=s===0;

function updateSpeedBtns(){
['sp0','sp1','sp5','sp10'].forEach(id=>document.getElementById(id).classList.remove('active'));

function switchTab(tab){

document.querySelectorAll('#tabs button').forEach(b=>b.classList.remove('active'));
document.querySelectorAll('#tabs button').forEach(b=>{if(b.textContent.includes({map:'地图',actions:'行动',tech:'科技',wonders:'奇迹',diplo:'外交',log:'历史'}[tab]))b.classList.add('active');});
document.querySelectorAll('.tab-pane').forEach(p=>p.style.display='none');
document.getElementById('tab-'+tab).style.display='block';
renderTab();
if(tab==='map') setTimeout(()=>{resizeCanvas();drawMap(document.getElementById('gameCanvas'),G.cities,false);},50);
}

function renderTab(){

switch(currentTab){

}

<div class="battle-strats">${BATTLE_STRATS.map(s=>

).join('')}</div>

window.resolveBattle=function(stratId, cityId, attStr, defStr, isDefending, enemyId){
const strat=BATTLE_STRATS.find(s=>s.id===stratId);
const enemyStrat=BATTLE_STRATS[Math.floor(Math.random()*BATTLE_STRATS.length)];

let attMod=1, defMod=1;
if(strat.strong===enemyStrat.id) attMod=1.5;
if(strat.weak===enemyStrat.id) defMod=1.5;

const terrain=TERRAINS[G.cities[cityId].terrain];
if(terrain.name==='山地') defMod*=1.3;
if(terrain.name==='平原') attMod*=1.1;

const attFinal=attStr*attMod*(0.8+Math.random()*0.4);
const defFinal=defStr*defMod*(0.8+Math.random()*0.4);
const won=isDefending?(defFinal>attFinal):(attFinal>defFinal);

const city=G.cities[cityId];
const narratives={
win_attack:[
`你的军队势如破竹，以${strat.name}突破敌军防线！${city.name}城头旌旗变换，胜利的欢呼响彻云霄！`,
`经过激烈交战，你的将士们攻克了${city.name}！敌军溃败，丢盔卸甲，这座城市从此归入你的版图。`,
`${city.name}之战载入史册！你的${strat.name}战术出奇制胜，敌军主帅被迫投降。`
],
lose_attack:[
`${city.name}城墙高耸，守军以${enemyStrat.name}顽强抵抗。你的军队损失惨重，不得不撤退。`,
`进攻${city.name}的战役以失败告终。敌军的防御超乎预期，你的将领含恨退兵。`
],
win_defend:[
`敌军来犯！但你的守军以${strat.name}迎敌，将入侵者击退。${city.name}安然无恙！`,
`一场惊心动魄的防御战！敌军的${enemyStrat.name}被你识破，${city.name}城池坚如磐石。`
],
lose_defend:[
`尽管奋力抵抗，${city.name}还是沦陷了。敌军的${enemyStrat.name}势不可挡，守军被迫撤离。`,
`${city.name}失守！敌军攻破城门，这座城市不再属于你。`
],
};

let narrative='';
if(isDefending){
if(won){
narrative=pick(narratives.win_defend);
// Repel attack
const ai=G.aiCivs.find(a=>a.id===enemyId);
if(ai)ai.mil=Math.max(0,ai.mil-attStr*0.3);
G.player.mil=Math.max(0,G.player.mil-defStr*0.1);
} else {
narrative=pick(narratives.lose_defend);
city.owner=enemyId;
G.player.cities=G.player.cities.filter(c=>c!==cityId);
const ai=G.aiCivs.find(a=>a.id===enemyId);
if(ai)ai.cities.push(cityId);
G.player.mil=Math.max(0,G.player.mil-defStr*0.5);
}
} else {
if(won){
narrative=pick(narratives.win_attack);
const prevOwner=city.owner;
const ai=G.aiCivs.find(a=>a.id===prevOwner);
if(ai)ai.cities=ai.cities.filter(c=>c!==cityId);
city.owner='player';
G.player.cities.push(cityId);
city.garrison=Math.floor(attStr*0.1);
G.player.mil=Math.max(0,G.player.mil-attStr*0.3);
// Set war relation
if(ai) G.player.relations[ai.id]='war';
} else {
narrative=pick(narratives.lose_attack);
G.player.mil=Math.max(0,G.player.mil-attStr*0.5);
}
}

addLog(`[战役] ${city.name}: ${won?'胜利':'失败'}`,  'battle');

const modal=document.getElementById('battleModal');
modal.querySelector('.modal').innerHTML=`<div class="battle-panel">
<h3 style="color:${won?'var(--success)':'var(--danger)'}">${won?'⚔️ 胜利！':'💀 败北...'}</h3>
<div class="battle-narrative">${narrative}</div>
<p style="font-size:0.85em;margin:8px 0">你的战术: ${strat.emoji} ${strat.name} vs 敌方: ${enemyStrat.emoji} ${enemyStrat.name}</p>
<p style="font-size:0.85em;color:var(--text-dim)">攻击力 ${Math.floor(attFinal)} vs 防御力 ${Math.floor(defFinal)}</p>
<div class="modal-actions"><button class="btn btn-gold" onclick="closeModal('battleModal')">继续</button></div>
</div>`;
updateSidebar();
};

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function renderTech(){
const p=G.player;
const pane=document.getElementById('tab-tech');
let html=`<h3 style="color:var(--gold);margin-bottom:12px">🔬 科技树</h3>`;
const isResearching=p.queue.some(q=>q.type==='research');

for(let i=0;i<=Math.min(p.eraIdx+1,ERAS.length-1);i++){
const era=ERAS[i];
const techs=TECH_TREE[era.id]||[];
html+=`<h4 style="color:${era.color};margin:16px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px">${era.name}</h4>`;
html+=`<div class="tech-grid">`;
for(const t of techs){
const researched=p.techs.includes(t.id);
const prereqMet=t.prereq.every(pr=>p.techs.includes(pr));
const available=!researched&&prereqMet&&!isResearching&&i<=p.eraIdx;
const researching=p.queue.some(q=>q.type==='research'&&q.techId===t.id);
let cls='tech-card';
if(researched)cls+=' researched';
else if(researching)cls+=' researching';
else if(available)cls+=' available';
else cls+=' locked';
html+=`<div class="${cls}" ${available?`onclick="startResearch('${t.id}')"`:''}><h5>${researched?'✅ ':''}${t.name}</h5><p>${t.desc}</p>`;
if(!researched) html+=`<p style="color:var(--accent);font-size:0.75em;margin-top:4px">科研点: ${t.cost}${researching?' (研究中)':''}</p>`;
if(t.prereq.length>0) html+=`<p style="font-size:0.7em;color:var(--text-dim)">需要: ${t.prereq.map(pr=>{const pt=findTech(pr);return pt?pt.name:pr;}).join(', ')}</p>`;
html+=`</div>`;
}
html+=`</div>`;
}
pane.innerHTML=html;
}

window.startResearch=function(techId){
const tech=findTech(techId);
if(!tech)return;
const p=G.player;
if(p.techs.includes(techId))return;
if(p.queue.some(q=>q.type==='research'))return;
// Duration based on cost and science level
const dur=yearsToSeconds(tech.cost/(5+p.science*0.1));
p.queue.push({type:'research',label:`研究: ${tech.name}`,duration:dur,elapsed:0,techId});
addLog(`开始研究: ${tech.name}`,'tech');
updateSidebar();
renderTech();
};

html+=`<button class="btn" style="background:rgba(255,74,74,0.2);font-size:0.8em;padding:4px 10px;color:var(--danger)" onclick="diploAction('${ai.id}','war')">⚔️ 宣战</button>`;
}
if(rel==='war'){
html+=`<button class="btn" style="background:var(--border);font-size:0.8em;padding:4px 10px" onclick="diploAction('${ai.id}','peace')">🕊️ 求和</button>`;
}
if(rel==='ally'){
html+=`<button class="btn" style="background:var(--border);font-size:0.8em;padding:4px 10px" onclick="diploAction('${ai.id}','neutral')">解除同盟</button>`;
}
html+=`</div></div>`;
}
pane.innerHTML=html;
}

window.diploAction=function(aiId,action){
const p=G.player;
const ai=G.aiCivs.find(a=>a.id===aiId);
if(!ai)return;
switch(action){
case 'trade':
p.relations[aiId]='trade';
p.gold+=20;ai.gold+=20;
addLog(`与${ai.name}建立贸易关系`,'diplo');
break;
case 'ally':
if(Math.random()<0.6+p.culture*0.001){
p.relations[aiId]='ally';
addLog(`与${ai.name}结为同盟!`,'diplo');
} else {
addLog(`${ai.name}拒绝了结盟请求`,'diplo');
}
break;
case 'war':
p.relations[aiId]='war';
addLog(`向${ai.name}宣战!`,'battle');
break;
case 'peace':
if(Math.random()<0.5+p.gold*0.001){
p.relations[aiId]='neutral';
p.gold-=Math.floor(p.gold*0.1);
addLog(`与${ai.name}达成和平协议`,'diplo');
} else {
addLog(`${ai.name}拒绝了和平提议`,'diplo');
}
break;
case 'neutral':
p.relations[aiId]='neutral';
addLog(`与${ai.name}解除同盟`,'diplo');
break;
}
renderDiplo();
updateSidebar();
};

closeModal('reformModal');
};

// ========== LOG ==========
function renderLog(){
const pane=document.getElementById('logPanel');
pane.innerHTML=G.log.slice(-100).reverse().map(l=>
`<div class="log-entry ${l.type||''}"><span class="log-date">${gameTimeToDate(l.time)}</span>${l.text}</div>`
).join('');
}

function addLog(text,type){
G.log.push({time:G.gameTime,text,type:type||'event'});
if(currentTab==='log') renderLog();
}

// ========== CITY SELECTION ==========
function selectCity(cid){
selectedCity=cid;
updateSidebar();
updateRightPanel();
if(currentTab==='map'){
drawMap(document.getElementById('gameCanvas'),G.cities,false);
}
}

// Map click handler
document.addEventListener('click',e=>{
if(!G)return;
const canvas=document.getElementById('gameCanvas');
if(!canvas||e.target!==canvas)return;
const rect=canvas.getBoundingClientRect();
const mx=(e.clientX-rect.left)/rect.width;
const my=(e.clientY-rect.top)/rect.height;
for(const c of Object.values(G.cities)){
const dx=c.x-mx,dy=c.y-my;
if(Math.sqrt(dx*dx+dy*dy)<0.02){
selectCity(c.id);
return;
}
}
});

function updateRightPanel(){
const panel=document.getElementById('detailContent');
const title=document.getElementById('detailTitle');
if(!selectedCity||!G.cities[selectedCity]){
title.textContent='选择城市查看详情';
panel.innerHTML='';
return;
}
const c=G.cities[selectedCity];
const t=TERRAINS[c.terrain];
const ownerName=c.owner==='player'?G.civName:(G.aiCivs.find(a=>a.id===c.owner)?.name||'无主');
title.textContent=c.name;
let html=`
<div class="stat-row"><span>地形</span><span class="stat-val">${t.emoji} ${t.name}</span></div>
<div class="stat-row"><span>大洲</span><span class="stat-val">${c.continent}</span></div>
<div class="stat-row"><span>拥有者</span><span class="stat-val">${ownerName}</span></div>
<div class="stat-row"><span>人口</span><span class="stat-val">${Math.floor(c.pop)}</span></div>
<div class="stat-row"><span>驻军</span><span class="stat-val">${Math.floor(c.garrison)}</span></div>
`;
// Adjacent cities
const adj=ADJACENCY[c.id]||[];
html+=`<h4 style="color:var(--gold);margin-top:12px;font-size:0.9em">邻近城市</h4>`;
for(const nid of adj){
const nc=G.cities[nid];
const no=nc.owner==='player'?G.civName:(G.aiCivs.find(a=>a.id===nc.owner)?.name||'无主');
html+=`<div class="city-list-item" onclick="selectCity('${nid}')" style="font-size:0.85em">${nc.name} <span style="color:var(--text-dim)">${no}</span></div>`;
}
panel.innerHTML=html;
}

// ========== WIN CONDITIONS ==========
setInterval(()=>{
if(!G||G.paused)return;
const p=G.player;
const totalCities=Object.values(G.cities).length;
const playerCities=p.cities.length;

// Conquest
if(playerCities>=totalCities*0.8) showVictory('征服胜利','你的版图覆盖了世界80%以上的城市！文明的旗帜飘扬在每一片大陆！');
// Science
const infoTechs=TECH_TREE.info||[];
if(infoTechs.every(t=>p.techs.includes(t.id))) showVictory('科技胜利','你的文明完成了所有信息时代科技研究，成功发射太空殖民船！星辰大海，我们来了！');
// Culture
const totalWonders=WONDERS.length;
if(p.wondersBuilt.length>=totalWonders*0.6&&p.culture>500) showVictory('文化胜利','你的文明建造了大部分世界奇迹，文化影响力辐射全球！');
// Diplomacy
const aliveAIs=G.aiCivs.filter(a=>a.cities.length>0);
const allies=aliveAIs.filter(a=>p.relations[a.id]==='ally');
if(aliveAIs.length>0&&allies.length>=aliveAIs.length*0.6) showVictory('外交胜利','你与大部分文明建立了同盟关系，在和平中实现了世界统一！');
},5000);

function showVictory(type,desc){
if(modalOpen)return;
G.paused=true;G.speed=0;
modalOpen=true;
const div=document.createElement('div');
div.className='modal-overlay';div.id='victoryModal';
div.innerHTML=`<div class="modal" style="text-align:center">
<h2 style="font-size:2em">🏆 ${type} 🏆</h2>
<p style="font-size:1.1em;margin:16px 0;line-height:1.6">${desc}</p>
<p style="color:var(--gold);font-size:1.2em">${G.civName} 万岁！</p>
<p style="color:var(--text-dim);margin-top:12px">游戏年份: ${gameTimeToDate(G.gameTime)}</p>
<p style="color:var(--text-dim)">城市: ${G.player.cities.length} | 科技: ${G.player.techs.length} | 奇迹: ${G.player.wondersBuilt.length}</p>
<div class="modal-actions" style="justify-content:center"><button class="btn btn-gold" onclick="closeModal('victoryModal')">继续游戏</button></div>
</div>`;
document.body.appendChild(div);
}

// ========== SAVE/LOAD ==========
function saveGame(){
if(!G)return;
localStorage.setItem('civ_save',JSON.stringify(G));
document.getElementById('statusMsg').textContent='✅ 存档成功!';
setTimeout(()=>{document.getElementById('statusMsg').textContent='游戏运行中';},2000);
}

function loadGame(){
const s=localStorage.getItem('civ_save');
if(!s){alert('没有找到存档');return;}
G=JSON.parse(s);
document.getElementById('startScreen').style.display='none';
document.getElementById('gameScreen').classList.add('active');
initGame();
}

// Periodic sidebar update
setInterval(()=>{if(G)updateSidebar();},2000);
setInterval(()=>{if(G)updateRightPanel();},3000);

// ========== INIT ==========
initStartScreen();
</script>
</body>
</html>
