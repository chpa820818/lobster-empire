<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 教务处 — 龙虾帝国</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦞</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a14;--card:#12121e;--border:#1a1a2e;--border-hover:#2a2a44;--text:#e8e8ee;--text-dim:#a0a0b4;--text-muted:#55556a;--gold:#d4a843;--gold-glow:rgba(212,168,67,.15);--accent:#e74c3c;--green:#27ae60;--blue:#4a90d9;--purple:#7c5cbf;--radius:14px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;--mono:'SF Mono','Fira Code',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding:20px}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(212,168,67,.04),transparent),var(--bg)}
.container{max-width:960px;margin:0 auto}
header{text-align:center;padding:24px 0 20px}
header h1{font-size:26px;font-weight:800;color:var(--gold);display:flex;align-items:center;justify-content:center;gap:10px}
header p{color:var(--text-dim);font-size:13px;margin-top:6px}
.back-link{display:inline-block;margin-bottom:12px;color:var(--text-dim);font-size:13px;text-decoration:none}
.back-link:hover{color:var(--gold)}
.upload-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:48px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--gold);background:rgba(212,168,67,.04)}
.drop-zone .icon{font-size:48px;margin-bottom:10px}
.drop-zone p{color:var(--text-dim);font-size:14px}
.drop-zone small{color:var(--text-muted);font-size:12px}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.preview-strip{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
.preview-thumb{width:120px;height:160px;border-radius:10px;border:2px solid var(--border);object-fit:cover;cursor:pointer;transition:all .2s;position:relative}
.preview-thumb:hover{border-color:var(--gold);transform:scale(1.03)}
.thumb-wrap{position:relative;display:inline-block}
.thumb-remove{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:rgba(231,76,60,.9);color:#fff;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;z-index:1}
.btn{padding:10px 24px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--gold),#b8922e);color:#0a0a14}
.btn-primary:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
.btn-secondary{background:rgba(255,255,255,.05);color:var(--text-dim);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border-hover);color:var(--text)}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;display:none}
.result-card.visible{display:block}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.result-header h2{font-size:18px;font-weight:700;color:var(--gold)}
/* Original images in result */
.orig-images{display:flex;gap:10px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);overflow-x:auto}
.orig-images img{height:180px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .2s;flex-shrink:0}
.orig-images img:hover{border-color:var(--gold);transform:scale(1.02)}
.orig-label{font-size:12px;color:var(--text-muted);margin-bottom:8px}
/* Document */
.doc-content{font-size:15px;line-height:2;color:var(--text);white-space:pre-wrap;word-wrap:break-word}
.doc-content h1,.doc-content h2,.doc-content h3{color:var(--gold);margin:20px 0 10px;line-height:1.4;white-space:normal}
.doc-content h1{font-size:22px;border-bottom:2px solid rgba(212,168,67,.2);padding-bottom:8px}
.doc-content h2{font-size:18px}
.doc-content h3{font-size:16px}
.doc-content strong{color:var(--text)}
.doc-content code{background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;font-family:var(--mono);font-size:13px}
.doc-content table{width:100%;border-collapse:collapse;margin:12px 0;font-size:14px}
.doc-content th{background:rgba(212,168,67,.1);color:var(--gold);padding:10px 12px;text-align:left;border-bottom:2px solid rgba(212,168,67,.2)}
.doc-content td{padding:8px 12px;border-bottom:1px solid var(--border)}
.doc-content .img-note{background:rgba(74,144,217,.08);border:1px solid rgba(74,144,217,.2);border-radius:10px;padding:10px 14px;margin:10px 0;font-size:13px;color:var(--blue);white-space:normal}
.loading{display:flex;align-items:center;gap:10px;padding:20px;color:var(--text-dim)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-steps{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.step{padding:4px 12px;border-radius:8px;font-size:11px;border:1px solid var(--border);color:var(--text-muted)}
.step.active{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}
.step.done{border-color:var(--green);color:var(--green);background:rgba(39,174,96,.08)}
/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);justify-content:center;align-items:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:92vw;max-height:92vh;border-radius:8px;object-fit:contain}
.lightbox .lb-close{position:absolute;top:16px;right:20px;font-size:28px;color:#fff;background:rgba(0,0,0,.5);border:none;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.lightbox .lb-close:hover{background:rgba(255,255,255,.15)}
.lightbox .lb-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:28px;color:#fff;background:rgba(0,0,0,.4);border:none;cursor:pointer;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.lightbox .lb-nav:hover{background:rgba(255,255,255,.12)}
.lightbox .lb-prev{left:16px}.lightbox .lb-next{right:16px}
.lightbox .lb-counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-size:13px;background:rgba(0,0,0,.4);padding:4px 14px;border-radius:16px}
.server-status{text-align:center;padding:8px;font-size:12px;border-radius:8px;margin-bottom:16px}
.server-status.ok{background:rgba(39,174,96,.1);color:var(--green);border:1px solid rgba(39,174,96,.2)}
.server-status.err{background:rgba(231,76,60,.1);color:var(--accent);border:1px solid rgba(231,76,60,.2)}
@media print{
  body{background:#fff;color:#000;padding:0}body::before{display:none}
  .upload-card,.back-link,header,.result-actions,.server-status,.lightbox{display:none!important}
  .result-card{background:#fff;border:none;padding:0;display:block!important}
  .result-header h2{color:#000}.doc-content{color:#000;font-size:13px;line-height:1.7}
  .doc-content h1,.doc-content h2,.doc-content h3{color:#333}
  .orig-images img{height:120px}
}
@media(max-width:600px){body{padding:12px}.upload-card,.result-card{padding:16px}.preview-thumb{width:80px;height:110px}.orig-images img{height:120px}}
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← 返回龙虾帝国</a>
  <header><h1>📋 教务处</h1><p>上传图片 → AI 智能识别 → 还原为可编辑文档</p></header>
  <div id="serverStatus" class="server-status ok">🟢 连接中...</div>

  <div class="upload-card">
    <div class="drop-zone" id="dropZone">
      <div class="icon">📷</div>
      <p>拖拽图片到此处，或点击选择</p>
      <small>支持 JPG / PNG / WebP · 横拍自动旋转 · 最多 10 张</small>
      <input type="file" id="fileInput" accept="image/*" multiple>
    </div>
    <div id="previewArea" style="display:none">
      <div class="preview-strip" id="previews"></div>
      <div style="display:flex;gap:10px;margin-top:16px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-primary" id="analyzeBtn" onclick="startAnalyze()">🔍 开始识别</button>
        <button class="btn btn-secondary" onclick="clearAll()">清空</button>
        <span style="font-size:12px;color:var(--text-muted)" id="statusText"></span>
      </div>
    </div>
    <div id="loadingArea" style="display:none">
      <div class="loading"><div class="spinner"></div><span id="loadingText">识别中...</span></div>
      <div class="progress-steps">
        <span class="step active" id="step1">1. 上传</span>
        <span class="step" id="step2">2. AI识别</span>
        <span class="step" id="step3">3. 生成文档</span>
      </div>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <h2>📄 识别结果</h2>
      <div class="result-actions" style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="window.print()" style="padding:6px 14px;font-size:12px">🖨️ 打印</button>
        <button class="btn btn-secondary" onclick="copyText()" style="padding:6px 14px;font-size:12px">📋 复制</button>
        <button class="btn btn-secondary" onclick="downloadDoc()" style="padding:6px 14px;font-size:12px">💾 下载</button>
      </div>
    </div>
    <div id="origImages"></div>
    <div class="doc-content" id="docContent"></div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLb(event)">
  <button class="lb-close" onclick="closeLb()">&times;</button>
  <button class="lb-nav lb-prev" onclick="navLb(event,-1)">‹</button>
  <img id="lbImg" src="">
  <button class="lb-nav lb-next" onclick="navLb(event,1)">›</button>
  <div class="lb-counter" id="lbCounter"></div>
</div>

<script>
const API = 'https://lobster-empire.cloud-ip.cc:3000';
let uploadedImages = [];
let rawResult = '';
let lbImages = [], lbIdx = 0;

// Lightbox
function openLb(images, idx) {
  lbImages = images; lbIdx = idx || 0;
  document.getElementById('lbImg').src = lbImages[lbIdx];
  document.getElementById('lbCounter').textContent = lbImages.length > 1 ? (lbIdx+1)+'/'+lbImages.length : '';
  document.querySelector('.lb-prev').style.display = lbImages.length > 1 ? 'flex' : 'none';
  document.querySelector('.lb-next').style.display = lbImages.length > 1 ? 'flex' : 'none';
  document.getElementById('lightbox').classList.add('open');
}
function closeLb(e) {
  if (e && e.target !== document.getElementById('lightbox') && e.target !== document.getElementById('lbImg') && !e.target.classList.contains('lb-close')) return;
  document.getElementById('lightbox').classList.remove('open');
}
function navLb(e, dir) {
  e.stopPropagation();
  lbIdx = (lbIdx + dir + lbImages.length) % lbImages.length;
  document.getElementById('lbImg').src = lbImages[lbIdx];
  document.getElementById('lbCounter').textContent = (lbIdx+1)+'/'+lbImages.length;
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') navLb(e, -1);
  if (e.key === 'ArrowRight') navLb(e, 1);
});

// Server check
(async () => {
  const el = document.getElementById('serverStatus');
  try { await fetch(API + '/api/edu/upload', { method: 'OPTIONS' }); el.className='server-status ok'; el.textContent='🟢 服务器已连接'; setTimeout(()=>el.style.display='none',2000); }
  catch { el.className='server-status err'; el.innerHTML='🔴 无法连接 — 请先访问 <a href="'+API+'" target="_blank" style="color:var(--accent)">'+API+'</a> 接受证书'; }
})();

// Upload handling
const dropZone = document.getElementById('dropZone'), fileInput = document.getElementById('fileInput');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', () => { handleFiles(fileInput.files); fileInput.value = ''; });

function handleFiles(files) {
  for (const f of files) {
    if (!f.type.startsWith('image/') || uploadedImages.length >= 10) continue;
    const reader = new FileReader();
    reader.onload = () => { uploadedImages.push({ file: f, dataUrl: reader.result }); renderPreviews(); };
    reader.readAsDataURL(f);
  }
}
function renderPreviews() {
  const area = document.getElementById('previewArea'), el = document.getElementById('previews');
  if (!uploadedImages.length) { area.style.display = 'none'; return; }
  area.style.display = 'block';
  const allUrls = uploadedImages.map(img => img.dataUrl);
  el.innerHTML = uploadedImages.map((img, i) => `
    <div class="thumb-wrap">
      <button class="thumb-remove" onclick="removeImg(${i})">✕</button>
      <img class="preview-thumb" src="${img.dataUrl}" onclick="openLb(${JSON.stringify(allUrls).replace(/"/g,'&quot;')},${i})">
    </div>`).join('');
  document.getElementById('statusText').textContent = uploadedImages.length + ' 张图片（点击可放大）';
}
function removeImg(i) { uploadedImages.splice(i, 1); renderPreviews(); }
function clearAll() { uploadedImages = []; renderPreviews(); document.getElementById('resultCard').classList.remove('visible'); }

// Store image filenames for cropping
let serverImageFiles = [];

// Analyze
async function startAnalyze() {
  if (!uploadedImages.length) return alert('请先上传图片');
  const btn = document.getElementById('analyzeBtn'), loading = document.getElementById('loadingArea');
  btn.disabled = true; loading.style.display = 'block';
  document.getElementById('resultCard').classList.remove('visible');
  setStep(1); document.getElementById('loadingText').textContent = '上传图片...';
  try {
    const fd = new FormData();
    uploadedImages.forEach(img => fd.append('images', img.file));
    const upResp = await fetch(API + '/api/edu/upload', { method: 'POST', body: fd });
    const upData = await upResp.json();
    if (!upData.success) throw new Error(upData.error || '上传失败');
    serverImageFiles = upData.files; // save for crop references
    setStep(2);
    document.getElementById('loadingText').textContent = 'AI 正在识别 ' + upData.files.length + ' 张图片...（每张约30秒）';
    const aResp = await fetch(API + '/api/edu/analyze', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ images: upData.files }) });
    const aData = await aResp.json();
    if (aData.error) throw new Error(aData.error);
    setStep(3);
    rawResult = aData.content;
    // Show original images
    const origEl = document.getElementById('origImages');
    if (aData.imageUrls && aData.imageUrls.length) {
      const fullUrls = aData.imageUrls.map(u => API + u);
      origEl.innerHTML = '<div class="orig-label">📸 原图（点击放大）</div><div class="orig-images">' +
        fullUrls.map((u,i) => '<img src="'+u+'" onclick="openLb('+JSON.stringify(fullUrls).replace(/"/g,'&quot;')+','+i+')" alt="原图'+(i+1)+'">').join('') + '</div>';
    } else { origEl.innerHTML = ''; }
    document.getElementById('docContent').innerHTML = renderDoc(aData.content);
    document.getElementById('resultCard').classList.add('visible');
  } catch (err) { alert('识别失败: ' + err.message); }
  btn.disabled = false; loading.style.display = 'none';
}
function setStep(n) { for(let i=1;i<=3;i++) document.getElementById('step'+i).className='step'+(i<n?' done':i===n?' active':''); }

function renderDoc(text) {
  // Track which page we're on (for multi-image)
  let currentPage = 0;
  
  // Handle SVG blocks
  const svgs = [];
  text = text.replace(/<svg[\s\S]*?<\/svg>/gi, svg => { const i=svgs.length; svgs.push('<div style="margin:12px 0;padding:16px;background:#fff;border:1px solid var(--border);border-radius:10px;text-align:center;overflow-x:auto"><div style="display:inline-block">'+svg+'</div></div>'); return '___SVG_'+i+'___'; });

  let html = text
    .replace(/```[\s\S]*?```/g, m => '<pre style="background:rgba(255,255,255,.04);padding:12px;border-radius:8px;font-size:13px;overflow-x:auto;white-space:pre-wrap">'+m.replace(/```\w*\n?/g,'').replace(/```/g,'')+'</pre>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm, (m, title) => {
      // Track page changes for multi-image
      const pageMatch = title.match(/第(\d+)页/);
      if (pageMatch) currentPage = parseInt(pageMatch[1]) - 1;
      return '<h2>' + title + '</h2>';
    })
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    // CROP tags -> inline cropped images
    .replace(/\[CROP:\s*(\d+)%?,\s*(\d+)%?,\s*(\d+)%?,\s*(\d+)%?,\s*(.+?)\]/g, (match, x, y, w, h, desc) => {
      // Determine which image file to crop from
      const imgIdx = Math.min(currentPage, serverImageFiles.length - 1);
      if (imgIdx < 0 || !serverImageFiles[imgIdx]) return '<div class="img-note">📐 ' + desc + '</div>';
      const fname = serverImageFiles[imgIdx].filename;
      const cropUrl = API + '/api/edu/crop/' + fname + '?x=' + x + '&y=' + y + '&w=' + w + '&h=' + h;
      return '<div style="margin:10px 0;text-align:center"><img src="' + cropUrl + '" style="max-width:320px;max-height:280px;border-radius:8px;border:1px solid var(--border);cursor:pointer" onclick="openLb([\'' + cropUrl + '\'],0)" alt="' + desc + '"><div style="font-size:11px;color:var(--text-muted);margin-top:4px">📐 ' + desc + '</div></div>';
    })
    // Fallback for [此处有图:...] 
    .replace(/\[此处有图[：:](.+?)\]/g,'<div class="img-note">📐 $1</div>')
    .replace(/\[图片描述[：:](.+?)\]/g,'<div class="img-note">🖼️ $1</div>')
    .replace(/\$\$(.+?)\$\$/gs,'<div style="background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.2);border-radius:8px;padding:8px 14px;margin:8px 0;font-family:var(--mono);color:var(--purple);text-align:center;white-space:normal">$1</div>')
    .replace(/\$(.+?)\$/g,'<code>$1</code>')
    .replace(/(\|.+\|\n\|[-| :]+\|\n(?:\|.+\|\n?)+)/g, m => {
      const lines=m.trim().split('\n').filter(l=>l.trim());
      if(lines.length<3)return m;
      const p=l=>l.split('|').map(c=>c.trim()).filter(c=>c!=='');
      const h=p(lines[0]),r=lines.slice(2).map(p);
      return '<table><thead><tr>'+h.map(c=>'<th>'+c+'</th>').join('')+'</tr></thead><tbody>'+r.map(cs=>'<tr>'+cs.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')+'</tbody></table>';
    })
    .replace(/^---$/gm,'<hr style="border:none;border-top:1px solid var(--border);margin:20px 0">')
    .replace(/\n/g,'<br>');

  svgs.forEach((s,i) => { html = html.replace('___SVG_'+i+'___', s); });
  return html;
}

function copyText() { navigator.clipboard.writeText(rawResult).then(()=>alert('已复制到剪贴板')); }
function downloadDoc() {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([rawResult],{type:'text/plain;charset=utf-8'}));
  a.download='教务处识别_'+new Date().toISOString().slice(0,10)+'.txt'; a.click();
}
</script>
</body>
</html>
